        {step:"🐍 Python 3.11+ Installation",desc:"# ── macOS ──\nbrew install python@3.11\n\n# ── Windows ──\nwinget install Python.Python.3.11\n# ⚠️ CHECK 'Add Python to PATH' during installation!\n\n# ── Ubuntu / Debian Linux ──\nsudo apt update\nsudo apt install python3.11 python3.11-venv python3-pip -y\n\n# ── Verify it works ──\npython3 --version   # Must show 3.11.x\npip3 --version      # Must show pip 23+\n\n# ── Why 3.11? ──\n# • 25% faster than 3.10\n# • Better error messages\n# • Required by modern ML libraries (PyTorch 2.x, etc)"},
        {step:"💻 VS Code + ML Extensions",desc:"# Download VS Code: code.visualstudio.com\n# Then open VS Code terminal and run:\n\ncode --install-extension ms-python.python\ncode --install-extension ms-toolsai.jupyter\ncode --install-extension charliermarsh.ruff\ncode --install-extension ms-python.pylance\ncode --install-extension GitHub.copilot\ncode --install-extension ms-azuretools.vscode-docker\ncode --install-extension eamodio.gitlens\ncode --install-extension PKief.material-icon-theme\n\n# Essential settings.json (Ctrl+Shift+P → Open User Settings JSON):\n{\n  \"editor.formatOnSave\": true,\n  \"editor.defaultFormatter\": \"charliermarsh.ruff\",\n  \"python.analysis.typeCheckingMode\": \"basic\",\n  \"jupyter.askForKernelRestart\": false\n}\n\n# NOTE: Ruff replaces flake8 + black + isort — faster, Rust-based"},
        {step:"🌿 Conda / Virtual Environments",desc:"# ── OPTION 1: Miniconda (Recommended for ML) ──\n# Download installer: repo.anaconda.com/miniconda\nbash Miniconda3-latest-Linux-x86_64.sh  # Linux\n# Run installer GUI on Windows/Mac\n\nconda init bash  # then restart terminal\n\n# Create a dedicated ML environment\nconda create -n mlenv python=3.11\nconda activate mlenv\nconda install numpy pandas matplotlib scikit-learn jupyter\n\n# ── OPTION 2: venv (Lightweight, built-in) ──\npython3 -m venv .venv\nsource .venv/bin/activate    # Linux/Mac\n.venv\\Scripts\\activate       # Windows PowerShell\n\n# Install from requirements file\npip install -r requirements.txt\n\n# ⚠️ GOLDEN RULE: One environment per project.\n# NEVER install ML packages in base/global Python.\n# Future you will be furious if you break this rule."},
        {step:"🐙 Git + GitHub SSH Setup",desc:"# Install Git\n# macOS:   brew install git\n# Ubuntu:  sudo apt install git\n# Windows: git-scm.com/download/win\n\n# Configure your identity\ngit config --global user.name 'Your Full Name'\ngit config --global user.email 'you@email.com'\ngit config --global init.defaultBranch main\ngit config --global core.editor 'code --wait'\n\n# Create SSH Key (ED25519 — fastest & most secure)\nssh-keygen -t ed25519 -C 'your@email.com'\neval \"$(ssh-agent -s)\"\nssh-add ~/.ssh/id_ed25519\n\n# Copy your PUBLIC key\ncat ~/.ssh/id_ed25519.pub\n# → Paste this into: GitHub → Settings → SSH Keys → New SSH Key\n\n# Test connection\nssh -T git@github.com\n# Expected: 'Hi username! You've successfully authenticated'\n\n# Essential Git workflow\ngit init && git add . && git commit -m 'Initial commit'\ngit remote add origin git@github.com:username/repo.git\ngit push -u origin main"},
        {step:"🐧 WSL2 + Ubuntu (Windows Only)",desc:"# ── Step 1: Install WSL2 ──\n# Open PowerShell as Administrator:\nwsl --install -d Ubuntu-22.04\nwsl --set-default-version 2\n# Restart your computer\n\n# ── Step 2: Set up Ubuntu ──\nwsl  # Opens Ubuntu terminal\nsudo apt update && sudo apt upgrade -y\nsudo apt install -y build-essential curl wget git htop\nsudo apt install -y python3.11 python3.11-venv python3-pip\n\n# ── Step 3: Install Node.js (for Next.js dev) ──\ncurl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -\nsudo apt install nodejs -y\n\n# ── Step 4: VS Code WSL Integration ──\n# Inside WSL terminal:\ncode .  # Magically opens VS Code connected to WSL!\n\n# ── Why WSL2? ──\n# Windows filesystem is slow for ML.\n# WSL2 = native Linux performance + Windows convenience.\n# ALL serious ML work on Windows must be inside WSL2."},
        {step:"🐳 Docker for ML",desc:"# Download Docker Desktop: docker.com/products/docker-desktop\n# Enable WSL2 backend on Windows (Settings → Resources → WSL Integration)\n\n# Pull the official GPU-ready PyTorch image\ndocker pull pytorch/pytorch:2.1.0-cuda12.1-cudnn8-runtime\n\n# Run Jupyter Lab inside Docker with GPU access\ndocker run -it --gpus all \\\n  -p 8888:8888 \\\n  -v $(pwd):/workspace \\\n  pytorch/pytorch:2.1.0-cuda12.1-cudnn8-runtime \\\n  jupyter lab --ip=0.0.0.0 --allow-root --no-browser\n# Then open the URL shown in terminal\n\n# Your project Dockerfile template:\nFROM pytorch/pytorch:2.1.0-cuda12.1-cudnn8-runtime\nWORKDIR /app\nCOPY requirements.txt .\nRUN pip install --no-cache-dir -r requirements.txt\nCOPY . .\nCMD [\"python\", \"train.py\"]\n\ndocker build -t my-ml-app .\ndocker run --gpus all my-ml-app\n\n# ✅ Docker = reproducible experiments forever"},
        {step:"📓 Jupyter Lab Setup",desc:"pip install jupyterlab\npip install jupyterlab-git nbformat ipywidgets\npip install jupyterlab-code-formatter black isort\n\n# Launch JupyterLab\njupyter lab --no-browser --port=8888\n# Open the URL printed in terminal\n\n# Register your conda environment as a kernel\nconda activate mlenv\npython -m ipykernel install --user --name=mlenv --display-name='Python (mlenv)'\n# Now select it: Kernel → Change Kernel → Python (mlenv)\n\n# Power user magic commands:\n%matplotlib inline    # Show plots inline in notebook\n%timeit my_function() # Benchmark execution speed\n%%time               # Time an entire cell\n%who                 # List all defined variables\n%run script.py       # Run a Python file\n%load_ext autoreload # Auto-reload modules on change\n%autoreload 2\n\n# Tip: Use JupyterLab (not classic Notebook)\n# Extensions transform the experience completely"},
        {step:"🏅 Kaggle API Setup",desc:"pip install kaggle\n\n# Step 1: Get your API credentials\n# Go to: kaggle.com → Account → scroll down → 'Create New Token'\n# This downloads kaggle.json to your Downloads folder\n\n# Step 2: Move credentials to the right place\nmkdir -p ~/.kaggle\nchmod 700 ~/.kaggle\nmv ~/Downloads/kaggle.json ~/.kaggle/\nchmod 600 ~/.kaggle/kaggle.json  # Important! Security\n\n# Step 3: Test it works\nkaggle competitions list\nkaggle datasets list -s 'machine learning'\n\n# Step 4: Download data like a pro\n# Download competition data:\nkaggle competitions download -c titanic\nunzip titanic.zip -d data/titanic/\n\n# Download any dataset:\nkaggle datasets download -d uciml/iris\n\n# ✅ Kaggle is your free ML playground\n# Competitions, datasets, notebooks, courses — all free"},
        {step:"⚡ FastAPI ML Deployment",desc:"pip install fastapi uvicorn pydantic joblib scikit-learn\n\n# Step 1: Train and save your model\nfrom sklearn.ensemble import RandomForestClassifier\nfrom sklearn.datasets import load_iris\nimport joblib\n\nX, y = load_iris(return_X_y=True)\nmodel = RandomForestClassifier(n_estimators=100, random_state=42)\nmodel.fit(X, y)\njoblib.dump(model, 'model.pkl')\nprint('Model saved to model.pkl!')\n\n# Step 2: Build your API (main.py)\nfrom fastapi import FastAPI, HTTPException\nfrom pydantic import BaseModel\nimport joblib, numpy as np\n\napp = FastAPI(title='My ML API', version='1.0')\nmodel = joblib.load('model.pkl')\n\nclass Features(BaseModel):\n    sepal_length: float\n    sepal_width: float\n    petal_length: float\n    petal_width: float\n\n@app.get('/health')\ndef health(): return {'status': 'alive', 'model': 'loaded'}\n\n@app.post('/predict')\ndef predict(f: Features):\n    X = np.array([[f.sepal_length, f.sepal_width, f.petal_length, f.petal_width]])\n    pred = int(model.predict(X)[0])\n    prob = float(model.predict_proba(X)[0].max())\n    classes = ['setosa', 'versicolor', 'virginica']\n    return {'species': classes[pred], 'confidence': round(prob, 4)}\n\n# Step 3: Run it!\nuvicorn main:app --reload --port 8000\n# Visit: http://localhost:8000/docs  ← Interactive API docs!"},

       steps:[
        {step:"Core Python Mastery",desc:"Master Python internals before touching ML:\n\n📌 DATA STRUCTURES (know time complexity):\n• list: O(1) append, O(n) search\n• dict: O(1) average lookup — use everywhere\n• set: O(1) membership test — underused gem\n• deque: O(1) both ends — use for BFS/queues\n\n📌 PYTHONIC PATTERNS:\n• List comprehensions: [x**2 for x in range(10) if x%2==0]\n• Generator expressions: (x**2 for x in huge_list)  ← memory efficient\n• Dictionary comprehensions: {k:v for k,v in items.items()}\n• Walrus operator: if (n := len(data)) > 10: print(n)\n\n📌 OOP FOR ML:\n• __init__, __repr__, __len__, __getitem__\n• Inheritance for model architectures\n• Dataclasses for configs: @dataclass class Config\n• Abstract classes for model interfaces\n\n📌 TYPE HINTS (Python 3.10+):\n• def train(X: np.ndarray, y: np.ndarray) -> float:\n• Use everywhere — catches bugs before runtime\n\nFREE COURSES:\n📚 CS50P — Harvard Python: cs50.harvard.edu/python\n📚 Automate the Boring Stuff: automatetheboringstuff.com\n📺 Corey Schafer Python Playlist (YouTube — best free Python)"},
        {step:"NumPy — The Foundation of All ML",desc:"NumPy is not optional. It IS machine learning.\n\n# Array creation\nimport numpy as np\na = np.array([1,2,3,4,5])           # from list\nb = np.zeros((3,4))                  # 3x4 zeros\nc = np.random.randn(100, 784)        # 100 images, 784 pixels\n\n# BROADCASTING — the most important NumPy concept\nA = np.array([[1,2,3],[4,5,6]])      # shape (2,3)\nb = np.array([10,20,30])             # shape (3,)\nresult = A + b  # shape (2,3) — b broadcast across rows!\n\n# VECTORIZATION — why NumPy is 100x faster than loops\n# SLOW (pure Python):\nresult = [x**2 for x in range(1000000)]  # 0.5 seconds\n# FAST (NumPy vectorized):\nresult = np.arange(1000000)**2           # 0.001 seconds\n\n# KEY OPERATIONS FOR ML:\nX = np.random.randn(1000, 20)  # 1000 samples, 20 features\nnp.dot(X.T, X)         # Gram matrix (covariance-like)\nnp.linalg.norm(X)      # Frobenius norm\nnp.linalg.svd(X)       # Singular Value Decomposition\nnp.einsum('ij,jk->ik', A, B)  # Efficient Einstein summation\n\nPROJECT: Implement matrix multiplication from scratch\n→ Pure Python loops vs NumPy dot vs np.einsum\n→ Benchmark with %timeit\n→ Target: 100x speedup with NumPy"},
        {step:"Pandas — Data Engineering Workhorse",desc:"import pandas as pd\n\n# Load data (many formats)\ndf = pd.read_csv('data.csv')\ndf = pd.read_json('data.json')\ndf = pd.read_parquet('data.parquet')  # fastest format\ndf = pd.read_sql('SELECT * FROM users', conn)\n\n# Data exploration\ndf.info()           # dtypes, non-null counts, memory\ndf.describe()       # statistics for numeric cols\ndf.isnull().sum()   # count missing values per column\ndf.duplicated().sum() # count duplicate rows\n\n# Data cleaning\ndf.dropna(subset=['target'])        # drop rows with null target\ndf['age'].fillna(df['age'].median()) # fill with median\ndf = df.drop_duplicates()\ndf['category'] = df['category'].astype('category')  # save memory\n\n# Feature engineering\ndf['age_group'] = pd.cut(df['age'], bins=[0,18,35,60,100],\n                          labels=['teen','young','mid','senior'])\ndf['year'] = pd.to_datetime(df['date']).dt.year\n\n# GroupBy — the split-apply-combine pattern\nstats = df.groupby('city').agg(\n    avg_salary=('salary', 'mean'),\n    count=('salary', 'count'),\n    max_salary=('salary', 'max')\n).reset_index()\n\nPROJECT: Full EDA on Titanic dataset\n→ 5 visualizations with Seaborn\n→ Document all findings in Jupyter notebook"},
        {step:"Production Python ML Pipeline",desc:"Professional ML project structure:\n\nmy-ml-project/\n├── data/\n│   ├── raw/          # Original, immutable data\n│   ├── processed/    # Cleaned, feature-engineered\n│   └── external/     # Third-party data sources\n├── notebooks/\n│   ├── 01-exploration.ipynb\n│   └── 02-modeling.ipynb\n├── src/\n│   ├── __init__.py\n│   ├── data/\n│   │   ├── load.py      # Data loading functions\n│   │   └── preprocess.py # Cleaning + validation\n│   ├── features/\n│   │   └── engineer.py  # Feature creation\n│   ├── models/\n│   │   ├── base.py      # Abstract base model\n│   │   ├── random_forest.py\n│   │   └── neural_net.py\n│   ├── training/\n│   │   └── train.py     # Training loops + evaluation\n│   └── utils/\n│       ├── config.py    # YAML config loading\n│       └── logging.py   # Structured logging\n├── tests/\n│   └── test_preprocess.py\n├── configs/\n│   └── config.yaml\n├── Dockerfile\n├── requirements.txt\n├── setup.py\n└── README.md\n\nCAPSTONE: Build this full structure for any classification problem.\nRequirements: type hints + docstrings + pytest + Docker + README"},
        {step:"Capstone: Production ML Data Pipeline",desc:"BUILD THIS. It proves you're an engineer, not just a notebook jockey.\n\nREQUIREMENTS:\n✓ Data ingestion from CSV + REST API (use a public API)\n✓ Data validation with Pydantic schemas (reject bad data!)\n✓ scikit-learn Pipeline (preprocessing + model in one object)\n✓ Proper Python logging (not print statements)\n✓ Unit tests with pytest, coverage > 80%\n✓ Type hints on EVERY function signature\n✓ CI/CD with GitHub Actions (run tests on every push)\n✓ Docker container (runs anywhere without setup)\n✓ README: problem, approach, results, how to run\n✓ Clean git history: meaningful commit messages\n\nSUGGESTED DATASET: Bank Marketing dataset (UCI)\nSUGGESTED TASK: Predict if a client subscribes to a term deposit\n\nXP REWARD: +1000 XP on submission to GitHub"}

      {id:"t8",icon:"🔢",title:"Track 2: Linear Algebra for ML",xp:900,color:"#E74C3C",
       resources:["https://ocw.mit.edu/courses/18-06-linear-algebra-spring-2010/","https://3blue1brown.com","https://numpy.org/doc/stable/reference/routines.linalg.html"],
       steps:[
        {step:"Vectors, Matrices & Transformations",desc:"Start with GEOMETRIC INTUITION, not equations:\n\n• A vector = direction + magnitude in n-dimensional space\n• A matrix = a linear transformation of space\n• Matrix multiplication = applying one transformation after another\n• Why ML uses matrices: process 1000 samples simultaneously!\n\n# The geometry of matrix multiplication\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nA = np.array([[2, 1], [1, 3]])  # transformation matrix\nv = np.array([1, 0])            # input vector\nAv = A @ v                      # transformed vector\n\n# Plot: where did v go after transformation by A?\n# This is exactly what neural network layers do!\n\nFREE RESOURCES (in order):\n1. 3Blue1Brown — Essence of Linear Algebra (YouTube)\n   → Start here. Best visual intuition on the internet.\n2. MIT 18.06 — Gilbert Strang (ocw.mit.edu)\n   → Best rigorous course. Free. Legendary professor.\n3. Gilbert Strang's lectures on YouTube\n   → Supplement with his book 'Introduction to Linear Algebra'\n\nEXERCISES:\n→ Prove (AB)ᵀ = BᵀAᵀ by hand, then verify with NumPy\n→ Draw vector addition + subtraction geometrically\n→ Visualize what happens to a grid of points under matrix A"},
        {step:"Eigenvalues & Eigenvectors",desc:"The most important concept in all of ML:\n\nDEFINITION: Av = λv\n• v = eigenvector (direction unchanged by transformation A)\n• λ = eigenvalue (how much v stretches/shrinks)\n\nGEOMETRIC INTUITION:\nMost vectors get rotated AND stretched by a matrix.\nEigenvectors ONLY get stretched — their direction is preserved.\nThey are the 'natural axes' of the transformation.\n\nWHY CRITICAL IN ML:\n• PCA: principal components are eigenvectors of covariance matrix\n• PageRank: web page importance is an eigenvector\n• Graph Neural Nets: spectral graph convolutions use eigendecomposition\n• Stability analysis: eigenvalues determine if systems converge\n• Dimensionality reduction: all major methods use it\n\n# Computing with NumPy\nA = np.array([[4, 1], [2, 3]])\neigenvalues, eigenvectors = np.linalg.eig(A)\nprint('Eigenvalues:', eigenvalues)\nprint('Eigenvectors (columns):', eigenvectors)\n\n# Verify: Av = λv\nv = eigenvectors[:, 0]  # first eigenvector\nlambda_1 = eigenvalues[0]\nassert np.allclose(A @ v, lambda_1 * v)  # Must be True!\n\nPROJECT: Animate eigenvectors of a 2x2 matrix with matplotlib\n→ Show original grid of points\n→ Show transformed grid\n→ Highlight eigenvectors staying in place"},
        {step:"SVD — The Most Powerful Decomposition",desc:"SVD: A = UΣVᵀ\n• U: left singular vectors (input feature space basis)\n• Σ: diagonal matrix of singular values (importance weights!)\n• Vᵀ: right singular vectors (output space basis)\n\nWHY SVD IS EVERYWHERE IN ML:\n• PCA = SVD of centered data matrix\n• LSA (text analysis) = SVD of TF-IDF matrix\n• Collaborative filtering = SVD of user-item matrix\n• Image compression = truncated SVD\n• Solving Ax=b = use SVD for numerical stability\n• Pseudoinverse: A⁺ = VΣ⁺Uᵀ\n\n# Image compression with SVD\nfrom PIL import Image\nimport numpy as np\n\nimg = np.array(Image.open('photo.jpg').convert('L'))  # grayscale\nU, S, Vt = np.linalg.svd(img, full_matrices=False)\n\n# Reconstruct with only top-k singular values\nfor k in [1, 5, 10, 50, 100, 200]:\n    compressed = U[:, :k] @ np.diag(S[:k]) @ Vt[:k, :]\n    # Plot compressed image\n    # Calculate compression ratio = (2*n*k + k) / (n*n)\n    print(f'k={k}: rank-{k} approximation, ratio = {(2*img.shape[0]*k+k)/(img.shape[0]**2):.2%}')\n\nPROJECT: Interactive compression demo\n→ Slider for k value\n→ Show original vs compressed side-by-side\n→ Plot singular value decay curve"},
        {step:"Capstone: Linear Algebra Library from Scratch",desc:"IMPLEMENT USING ONLY PURE PYTHON (no NumPy, no libraries):\n\nclass Matrix:\n    def __init__(self, data: list[list[float]]):\n        self.data = data\n        self.rows = len(data)\n        self.cols = len(data[0])\n    \n    # Must implement all of these:\n    def __add__(self, other): ...\n    def __mul__(self, other): ...  # matrix multiply\n    def transpose(self): ...\n    def determinant(self): ...    # recursive cofactor expansion\n    def inverse(self): ...        # Gauss-Jordan elimination\n    def lu_decompose(self): ...   # LU factorization\n    def qr_decompose(self): ...   # QR factorization (Gram-Schmidt)\n    def power_iteration(self, n_iter=1000): ...  # dominant eigenvalue\n    def solve(self, b): ...       # solve Ax = b\n\n# ALSO IMPLEMENT:\ndef dot_product(u, v): ...\ndef cross_product(u, v): ...\ndef gram_schmidt(vectors): ...  # orthogonalization\ndef least_squares(A, b): ...    # solve overdetermined system\n\n# DELIVERABLES:\n✓ All methods above with type hints + docstrings\n✓ pytest unit tests (compare output to NumPy ground truth)\n✓ Performance benchmark vs NumPy (show the gap!)\n✓ README explaining each algorithm with the math\n✓ GitHub repo with clean commit history\n\nXP: +900 — this project proves deep mathematical understanding."}
       ]},
      {id:"t9",icon:"🎲",title:"Track 3: Probability & Statistics for ML",xp:900,color:"#9B59B6",
       resources:["https://web.stanford.edu/class/cs109/","https://khanacademy.org/math/statistics-probability","https://scipy.org"],
       steps:[
        {step:"Probability Foundations",desc:"The language of uncertainty — learn to speak it:\n\nFUNDAMENTALS:\n• Sample space Ω: all possible outcomes\n• Event A: subset of sample space\n• P(A): probability of event A, 0 ≤ P(A) ≤ 1\n• P(Ω) = 1: probabilities sum to 1\n\nKEY RULES:\n• Addition: P(A∪B) = P(A) + P(B) - P(A∩B)\n• Multiplication: P(A∩B) = P(A|B)·P(B)\n• Complement: P(Aᶜ) = 1 - P(A)\n• Total probability: P(B) = Σ P(B|Aᵢ)·P(Aᵢ)\n\nBAYES' THEOREM — the most important formula in ML:\nP(θ|X) = P(X|θ) · P(θ) / P(X)\n   ↑           ↑        ↑      ↑\nposterior  likelihood  prior  evidence\n\nINTUITION: You have a belief (prior). You see data. You update your belief (posterior). This IS machine learning.\n\nWHY PROBABILITY MATTERS IN ML:\n• Neural networks output probability distributions\n• Loss functions (cross-entropy) come from probability theory\n• Regularization = Bayesian priors on weights\n• Uncertainty quantification = knowing what you don't know\n\nFREE RESOURCES:\n📚 Stanford CS109 (web.stanford.edu/class/cs109)\n📺 MIT 6.041 on YouTube\n📚 Khan Academy Statistics (start here if rusty)"},
        {step:"Key Distributions Every ML Engineer Must Know",desc:"DISCRETE DISTRIBUTIONS:\n\n• Bernoulli(p): one coin flip\n  P(X=1) = p, P(X=0) = 1-p\n  Use: binary classification output\n\n• Binomial(n,p): n independent coin flips\n  P(X=k) = C(n,k) · pᵏ · (1-p)ⁿ⁻ᵏ\n  Use: number of successes in n trials\n\n• Categorical(p₁,...,pₖ): one roll of k-sided die\n  Use: multiclass classification output (softmax!)\n\n• Poisson(λ): events in time window\n  P(X=k) = λᵏe⁻λ / k!\n  Use: count data, rare events\n\nCONTINUOUS DISTRIBUTIONS:\n\n• Gaussian/Normal N(μ,σ²): the bell curve\n  f(x) = (1/√2πσ²) · exp(-(x-μ)²/2σ²)\n  Appears everywhere — Central Limit Theorem explains why\n\n• Uniform U(a,b): equal probability across range\n  Use: random initialization, dropout masks\n\n• Beta(α,β): probability of probabilities\n  Defined on [0,1]. Use: Bayesian models, Thompson sampling\n\n• Dirichlet(α): distribution over probability vectors\n  Sums to 1. Use: topic models (LDA), Bayesian classification\n\nPROJECT: Simulate each distribution in Python\n→ numpy.random for generation\n→ scipy.stats for PDF/CDF\n→ Plot histograms vs theoretical curves\n→ Verify mean and variance match theory"},
        {step:"Maximum Likelihood Estimation",desc:"MLE = the mathematical foundation of ALL model training:\n\nINTUITION:\nGiven data X, find parameters θ that make the data most probable.\n\nOBJECTIVE:\nθ_MLE = argmax_θ L(θ|X) = argmax_θ Π p(xᵢ|θ)\n\nTAKE LOG (products → sums, more stable):\nθ_MLE = argmax_θ log L = argmax_θ Σ log p(xᵢ|θ)\n\nMINIMIZE NEGATIVE LOG-LIKELIHOOD:\nθ_MLE = argmin_θ -Σ log p(xᵢ|θ)\n\nEXAMPLES OF MLE IN ML:\n• Linear regression → MLE under Gaussian noise assumption\n• Logistic regression → MLE under Bernoulli assumption\n• Neural networks → MLE with cross-entropy loss\n  (Cross-entropy = negative log-likelihood of categorical!)\n\nPROJECT: Derive MLE for Gaussian analytically:\nStep 1: Write log-likelihood for Gaussian data\nStep 2: Take derivative w.r.t. μ, set to 0\nStep 3: Show μ_MLE = x̄ (sample mean!)\nStep 4: Derive σ²_MLE = sample variance\nStep 5: Implement in Python, verify with scipy.stats.norm.fit()"},
        {step:"Capstone: Bayesian A/B Testing Engine",desc:"Build a complete statistical decision engine:\n\nPROBLEM: Two website variants A and B.\nWhich one converts better? How confident are we?\n\nFREQUENTIST APPROACH (traditional):\n• H₀: conversion_A = conversion_B\n• Run t-test or chi-square test\n• Get p-value\n• Problem: binary decision, no uncertainty quantification\n\nBAYESIAN APPROACH (superior for AB testing):\n• Prior: both variants start with Beta(1,1) — uniform\n• Observe: conversions + failures for each variant\n• Update: Beta(1+successes, 1+failures) — posterior\n• Decision: P(B > A) = Monte Carlo integration\n\n# Implementation\nimport numpy as np\nfrom scipy import stats\n\nclass BayesianABTest:\n    def __init__(self):\n        self.a_alpha, self.a_beta = 1, 1  # prior\n        self.b_alpha, self.b_beta = 1, 1\n    \n    def update_a(self, successes, failures):\n        self.a_alpha += successes\n        self.a_beta += failures\n    \n    def update_b(self, successes, failures):\n        self.b_alpha += successes\n        self.b_beta += failures\n    \n    def prob_b_beats_a(self, n_samples=100000):\n        a_samples = np.random.beta(self.a_alpha, self.a_beta, n_samples)\n        b_samples = np.random.beta(self.b_alpha, self.b_beta, n_samples)\n        return (b_samples > a_samples).mean()\n    \n    def plot_posteriors(self): ...\n\nDELIVERABLES:\n✓ BayesianABTest class with all methods\n✓ Simulation: generate fake A/B data, recover true rates\n✓ Visualization: evolving posteriors over time\n✓ Comparison vs frequentist t-test\n✓ Monte Carlo expected loss calculation\n✓ GitHub repo + Jupyter notebook with full analysis"}
       ]},

       resources:["https://coursera.org/specializations/machine-learning-introduction","https://fast.ai","https://statlearning.com","https://scikit-learn.org","https://xgboost.readthedocs.io"],
       steps:[
        {step:"ML Fundamentals — The Big Picture",desc:"TYPES OF MACHINE LEARNING:\n• Supervised: learn f(X)→y from labeled examples\n• Unsupervised: find structure in X without labels\n• Semi-supervised: few labels + many unlabeled samples\n• Reinforcement: learn from reward signals (environment)\n• Self-supervised: create labels from the data itself (GPT!)\n\nTHE BIAS-VARIANCE TRADEOFF:\nTotal Error = Bias² + Variance + Irreducible Noise\n• High Bias: model too simple → underfitting\n• High Variance: model memorizes training data → overfitting\n• Goal: find the sweet spot\n\nDIAGNOSIS:\n• Training error high → high bias (underfitting) → more complex model\n• Train/Val gap large → high variance (overfitting) → regularize\n\nREGULARIZATION TECHNIQUES:\n• L1 (Lasso): adds |w| penalty → forces sparse weights → feature selection\n• L2 (Ridge): adds w² penalty → shrinks weights → handles collinearity\n• Dropout: randomly zero neurons → ensemble effect\n• Data augmentation: artificially expand training set\n• Early stopping: stop training when validation loss increases\n• Weight decay: L2 regularization on optimizer\n\nFREE COURSES:\n📚 Andrew Ng ML Specialization — coursera.org (AUDIT FREE)\n📺 fast.ai — fast.ai/courses (BEST practical ML course ever)\n📚 ISLR — statlearning.com (free PDF — stats ML bible)"},
        {step:"Linear Regression from Scratch",desc:"Build every model from scratch FIRST. Then use sklearn.\nThis is how you actually understand it.\n\nimport numpy as np\n\nclass LinearRegression:\n    \"\"\"Linear Regression using Gradient Descent.\"\"\"\n    \n    def __init__(self, learning_rate=0.01, n_iterations=1000):\n        self.lr = learning_rate\n        self.n_iters = n_iterations\n        self.weights = None\n        self.bias = None\n        self.loss_history = []\n    \n    def fit(self, X: np.ndarray, y: np.ndarray) -> 'LinearRegression':\n        n_samples, n_features = X.shape\n        self.weights = np.zeros(n_features)\n        self.bias = 0.0\n        \n        for epoch in range(self.n_iters):\n            # Forward pass: compute predictions\n            y_pred = X @ self.weights + self.bias\n            \n            # Compute MSE loss\n            loss = np.mean((y_pred - y) ** 2)\n            self.loss_history.append(loss)\n            \n            # Backward pass: compute gradients\n            error = y_pred - y\n            dw = (2 / n_samples) * (X.T @ error)  # gradient w.r.t. weights\n            db = (2 / n_samples) * error.sum()     # gradient w.r.t. bias\n            \n            # Update parameters (gradient descent step)\n            self.weights -= self.lr * dw\n            self.bias    -= self.lr * db\n        \n        return self\n    \n    def predict(self, X: np.ndarray) -> np.ndarray:\n        return X @ self.weights + self.bias\n    \n    def score(self, X, y):\n        y_pred = self.predict(X)\n        ss_res = ((y - y_pred) ** 2).sum()\n        ss_tot = ((y - y.mean()) ** 2).sum()\n        return 1 - ss_res / ss_tot  # R² score\n\n# Test on California Housing dataset\nfrom sklearn.datasets import fetch_california_housing\nfrom sklearn.model_selection import train_test_split\nfrom sklearn.preprocessing import StandardScaler\n\nX, y = fetch_california_housing(return_X_y=True)\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\nscaler = StandardScaler()\nX_train = scaler.fit_transform(X_train)\nX_test = scaler.transform(X_test)\n\nmodel = LinearRegression(learning_rate=0.01, n_iterations=2000)\nmodel.fit(X_train, y_train)\nprint(f'R² Score: {model.score(X_test, y_test):.4f}')"},
        {step:"Gradient Boosting — The Kaggle Champion",desc:"XGBoost wins more Kaggle competitions than any other model.\nHere's why and how to use it:\n\nDECISION TREES (foundation):\n• Split data into regions using feature thresholds\n• Splitting criterion: Gini impurity or Information Gain\n• Grow until: max_depth reached, or min_samples reached\n• Pros: interpretable, handles mixed data, no scaling needed\n• Cons: high variance, overfits easily\n\nRANDOM FORESTS (reduce variance):\n• Build B trees on bootstrap samples (rows)\n• At each split, use random sqrt(n_features) features\n• Average predictions → reduces variance dramatically\n• Feature importance: how much each feature decreases impurity\n\nGRADIENT BOOSTING (reduce bias iteratively):\n1. Initialize with constant prediction (mean of y)\n2. Compute residuals (errors of current model)\n3. Fit a decision tree to the residuals\n4. Add tree to ensemble with learning rate η\n5. Repeat steps 2-4 for N trees\n\n# XGBoost — production-grade gradient boosting\npip install xgboost lightgbm\n\nimport xgboost as xgb\nfrom sklearn.model_selection import GridSearchCV\n\nmodel = xgb.XGBClassifier(\n    n_estimators=500,\n    learning_rate=0.05,\n    max_depth=6,\n    subsample=0.8,\n    colsample_bytree=0.8,\n    reg_alpha=0.1,   # L1 regularization\n    reg_lambda=1.0,  # L2 regularization\n    random_state=42,\n    eval_metric='logloss',\n    early_stopping_rounds=50\n)\n\nmodel.fit(X_train, y_train,\n          eval_set=[(X_val, y_val)],\n          verbose=100)\n\nCAPSTONE: Achieve top 25% on Kaggle Titanic or House Prices"},
        {step:"Capstone: Kaggle Competition — Top 25%",desc:"This is your first real engineering achievement.\n\nCHOOSE ONE COMPETITION:\nA) Titanic Survival (Classification) — perfect for beginners\nB) House Prices Advanced Regression — great for features\nC) Digit Recognizer (CNN) — intro to computer vision\n\nYOUR SUBMISSION REQUIREMENTS:\n\nStep 1: Exploratory Data Analysis (EDA)\n✓ Distribution plots for all features\n✓ Correlation matrix heatmap\n✓ Missing value analysis + imputation strategy\n✓ Target variable distribution\n✓ Feature engineering ideas documented\n\nStep 2: Feature Engineering\n✓ At least 5 new engineered features\n✓ Categorical encoding: target encoding or one-hot\n✓ Scaling: StandardScaler or RobustScaler\n✓ Sklearn Pipeline object (no data leakage!)\n\nStep 3: Model Development\n✓ Baseline: dummy classifier/regressor\n✓ Model 1: Logistic Regression / Ridge Regression\n✓ Model 2: Random Forest\n✓ Model 3: XGBoost or LightGBM\n✓ Hyperparameter tuning with Optuna (pip install optuna)\n\nStep 4: Ensemble\n✓ Voting/averaging of top 2-3 models\n✓ Stacking with cross-validation\n\nStep 5: Submit\n✓ Score in top 25% on public leaderboard\n✓ Kaggle notebook publicly available\n✓ GitHub repo with all code\n✓ Write-up: what worked, what failed, what you learned\n\nXP REWARD: +1500 XP — the largest single XP award so far!"}
       ]},
      {id:"t11",icon:"🧠",title:"Track 5: Deep Learning — Zero to GPT",xp:1500,color:"#E67E22",
       resources:["https://karpathy.ai/zero-to-hero.html","https://pytorch.org/tutorials","https://fast.ai","https://huggingface.co/course","https://youtube.com/@YannicKilcher"],
       steps:[
        {step:"Neural Networks from Absolute Zero",desc:"Andrej Karpathy's path — the BEST way to learn deep learning:\n\nSTEP 1: micrograd (Week 1)\n→ Implement backpropagation from scratch in 50 lines\n→ Build Value class: stores number + gradient\n→ Implement: +, *, tanh, exp operations\n→ Chain rule flows automatically backward!\n→ Watch: 'The spelled-out intro to neural networks' (Karpathy, YouTube)\n\nSTEP 2: makemore (Week 2-3)\n→ Build character-level language model\n→ Start: bigram model (pure counting)\n→ Upgrade: trigram → MLP (Bengio 2003 paper!)\n→ Train on names dataset → generates new names\n→ Key lesson: this IS how ChatGPT works, just smaller\n\nSTEP 3: GPT from scratch (Week 4)\n→ Implement self-attention from scratch\n→ Build transformer blocks\n→ Train on Shakespeare → generates Shakespeare!\n→ Watch: 'Let's build GPT from scratch' (Karpathy, YouTube)\n→ 2 hours of the most valuable deep learning education on the internet\n\nNOTE: DO NOT SKIP THESE STEPS.\nEvery shortcut you take here will haunt you for years.\nWatch every video. Type every line of code. Understand every equation."},
        {step:"Backpropagation — The Algorithm That Runs the World",desc:"Backprop is just the chain rule. That's it.\n\nFORWARD PASS (compute output):\nx → linear → relu → linear → sigmoid → ŷ → loss\n\nBACKWARD PASS (compute gradients via chain rule):\nloss ← ∂loss/∂ŷ ← ∂ŷ/∂z₂ ← ∂z₂/∂W₂ ← ...\n\nCHAIN RULE:\n∂L/∂W₁ = (∂L/∂ŷ) · (∂ŷ/∂h) · (∂h/∂z₁) · (∂z₁/∂W₁)\n\nKEY GRADIENTS TO MEMORIZE:\n• Linear: ∂L/∂W = δ · xᵀ,  ∂L/∂x = Wᵀ · δ\n• ReLU: ∂ = 1 if x > 0 else 0  (the dying ReLU problem!)\n• Sigmoid: σ'(x) = σ(x) · (1 - σ(x))\n• Softmax + Cross-Entropy combined: ŷ - y  (beautiful!)\n• Tanh: 1 - tanh²(x)\n\nPROJECT: 2-Layer MLP in PURE PYTHON (no PyTorch, no NumPy for autograd)\n→ Forward pass implementation\n→ Manual chain rule for backward pass\n→ Stochastic gradient descent update\n→ Train on XOR problem (must learn this non-linearity!)\n→ Train on MNIST (achieve > 95% accuracy)\n→ Visualize: loss curves, weight distributions, activations"},
        {step:"The Transformer Architecture",desc:"The architecture that changed everything:\n\nSELF-ATTENTION (the key innovation):\nAttention(Q, K, V) = softmax(QKᵀ / √d_k) · V\n\n• Q (Query): 'What am I looking for?'\n• K (Key): 'What do I have to offer?'\n• V (Value): 'What information do I give if selected?'\n• √d_k: scaling prevents vanishing gradients in softmax\n\nMULTI-HEAD ATTENTION:\n• Run h attention heads in parallel\n• Each head learns different relationship types\n  (Head 1: syntax, Head 2: coreference, Head 3: position)\n• Concatenate outputs, project to d_model\n\nFULL TRANSFORMER BLOCK:\n1. Input embedding + positional encoding\n2. Multi-head self-attention\n3. Add residual + LayerNorm  ← crucial for training stability\n4. Feed-forward network (2 linear layers + GeLU)\n5. Add residual + LayerNorm\n\nPYTORCH IMPLEMENTATION:\nimport torch\nimport torch.nn as nn\n\nclass SelfAttention(nn.Module):\n    def __init__(self, d_model, n_heads):\n        super().__init__()\n        self.d_k = d_model // n_heads\n        self.n_heads = n_heads\n        self.qkv = nn.Linear(d_model, 3 * d_model)\n        self.proj = nn.Linear(d_model, d_model)\n    \n    def forward(self, x, mask=None):\n        B, T, C = x.shape\n        qkv = self.qkv(x).reshape(B, T, 3, self.n_heads, self.d_k)\n        q, k, v = qkv.unbind(2)  # each: (B, T, n_heads, d_k)\n        q, k, v = q.transpose(1,2), k.transpose(1,2), v.transpose(1,2)\n        \n        attn = (q @ k.transpose(-2,-1)) / (self.d_k ** 0.5)\n        if mask is not None:\n            attn = attn.masked_fill(mask == 0, float('-inf'))\n        attn = attn.softmax(-1)\n        \n        out = (attn @ v).transpose(1,2).reshape(B, T, C)\n        return self.proj(out)"},
        {step:"Training Tricks & Production PyTorch",desc:"What research papers don't teach you — the dark arts of training:\n\nOPTIMIZERS:\n• SGD + Momentum: classic, needs careful lr tuning\n• Adam: lr=1e-3 default, usually works out of the box\n• AdamW: Adam + correct weight decay (default for transformers!)\n\nLEARNING RATE STRATEGIES:\n• Warmup + Cosine Decay: ramp up slowly, decay smoothly\n• OneCycleLR: fast.ai's secret weapon\n\nTRAINING STABILITY:\n• Batch Normalization: normalize activations within batch → stable training\n• Layer Normalization: normalize per sample → preferred in transformers\n• Gradient clipping: clip_grad_norm_(model.parameters(), 1.0)\n  → Prevents exploding gradients without killing signal\n• Mixed precision: torch.cuda.amp.autocast() → 2x faster, half memory\n\nDEBUGGING NEURAL NETS (Karpathy's checklist):\n1. Overfit a single batch first → if it can't, architecture is broken\n2. Visualize loss curves → should decrease smoothly\n3. Check gradient magnitudes → too small = vanishing, too large = exploding\n4. Inspect weight distributions → should be roughly Gaussian\n5. Visualize attention maps → should show meaningful patterns\n6. Monitor gradient norms per layer → diagnose bottlenecks\n\nPRODUCTION PYTORCH TEMPLATE:\nimport torch, wandb\nfrom torch.cuda.amp import GradScaler, autocast\n\nscaler = GradScaler()  # mixed precision training\nfor epoch in range(N_EPOCHS):\n    for batch in train_loader:\n        optimizer.zero_grad()\n        with autocast():\n            output = model(batch)\n            loss = criterion(output, target)\n        scaler.scale(loss).backward()\n        scaler.unscale_(optimizer)\n        torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n        scaler.step(optimizer)\n        scaler.update()\n        scheduler.step()\n        wandb.log({'loss': loss.item()})  # track everything!"},
        {step:"Capstone: Train a GPT from Scratch",desc:"The ultimate deep learning capstone:\n\nBUILD A CHARACTER-LEVEL GPT THAT GENERATES COHERENT TEXT.\n\nREQUIREMENTS:\n✓ Implement Transformer architecture from scratch in PyTorch\n  - Token embedding + positional encoding\n  - N layers of transformer blocks\n  - Multi-head causal self-attention (causal = no peeking at future!)\n  - Feed-forward blocks with GeLU activation\n  - Final linear head + softmax\n✓ Dataset: choose any text corpus you like\n  - Shakespeare (classic, Karpathy's dataset)\n  - Bengali literature (unique! represent Bangladesh!)\n  - Python source code (generate code!)\n  - Song lyrics of your favorite artist\n✓ Training:\n  - Implement AdamW optimizer with warmup + cosine decay\n  - Track loss with W&B (weights-and-biases.com free tier)\n  - Train until loss < 1.5 (model generates coherent text)\n✓ Generation:\n  - Temperature sampling\n  - Top-p (nucleus) sampling\n  - Show samples every N steps during training\n✓ Analysis:\n  - Plot loss curves\n  - Visualize attention patterns as heatmaps\n  - Show generated samples at different training checkpoints\n✓ GitHub repo with:\n  - Clean, commented code\n  - README explaining architecture + results\n  - Sample generated text\n  - Training loss plot\n  - Link to W&B run\n\nXP: +1500. This project alone gets you ML interviews."}
       ]},
      {id:"t12",icon:"🚀",title:"Track 6: MLOps — Production ML Systems",xp:1000,color:"#00B894",
       resources:["https://mlflow.org/docs/latest","https://dvc.org/doc","https://docs.wandb.ai","https://optuna.readthedocs.io","https://docs.github.com/en/actions"],
       steps:[
        {step:"MLOps Fundamentals",desc:"MLOps = ML + DevOps + Data Engineering\n\nTHE FULL ML LIFECYCLE:\n1. Data ingestion → 2. Data validation → 3. Feature engineering\n4. Model training → 5. Experiment tracking → 6. Model evaluation\n7. Model registry → 8. Deployment → 9. Monitoring → 10. Retraining\n\nWHY MOST ML PROJECTS FAIL IN PRODUCTION:\n❌ No experiment tracking → can't reproduce the best model\n❌ No data versioning → dataset changed silently under you\n❌ No monitoring → model degrades without anyone noticing\n❌ No CI/CD → deployment is manual, error-prone, terrifying\n❌ No retraining pipeline → model becomes stale over time\n\nFREE MLOPS TOOL STACK:\n• MLflow → experiment tracking + model registry (local)\n• DVC → data version control (free with Google Drive)\n• W&B → experiment visualization (free tier = generous)\n• Optuna → hyperparameter optimization (open source)\n• GitHub Actions → CI/CD (free for public repos)\n• FastAPI → model serving\n• Docker → reproducible environments\n\nMINDSET SHIFT:\nYou're not building an ML model.\nYou're building a system that continuously improves models.\nThat's the difference between a data scientist and an ML engineer."},
        {step:"Experiment Tracking with MLflow",desc:"pip install mlflow scikit-learn pandas\n\n# Basic experiment tracking\nimport mlflow\nimport mlflow.sklearn\nfrom sklearn.ensemble import RandomForestClassifier\nfrom sklearn.metrics import accuracy_score, f1_score\n\n# Set the experiment name\nmlflow.set_experiment('fraud_detection_v2')\n\nwith mlflow.start_run(run_name='rf_baseline'):\n    # Log hyperparameters\n    mlflow.log_param('n_estimators', 100)\n    mlflow.log_param('max_depth', 6)\n    mlflow.log_param('min_samples_leaf', 5)\n    mlflow.log_param('class_weight', 'balanced')\n    \n    # Train model\n    model = RandomForestClassifier(\n        n_estimators=100, max_depth=6,\n        min_samples_leaf=5, class_weight='balanced',\n        random_state=42\n    )\n    model.fit(X_train, y_train)\n    \n    # Log metrics\n    y_pred = model.predict(X_test)\n    mlflow.log_metric('accuracy', accuracy_score(y_test, y_pred))\n    mlflow.log_metric('f1_score', f1_score(y_test, y_pred))\n    mlflow.log_metric('train_time_seconds', 12.4)\n    \n    # Log artifacts\n    import matplotlib.pyplot as plt\n    from sklearn.metrics import ConfusionMatrixDisplay\n    fig, ax = plt.subplots()\n    ConfusionMatrixDisplay.from_predictions(y_test, y_pred, ax=ax)\n    mlflow.log_figure(fig, 'confusion_matrix.png')\n    \n    # Register the model\n    mlflow.sklearn.log_model(model, 'random_forest_model',\n                              registered_model_name='FraudDetector')\n\n# Launch UI to visualize all experiments\n# mlflow ui  → visit localhost:5000\n# Compare runs, plot metrics, download models"},
        {step:"Data Version Control with DVC",desc:"# Install DVC\npip install dvc dvc-gdrive\n\n# Initialize DVC in your Git repo\ngit init\ndvc init\ngit add .dvc .dvcignore\ngit commit -m 'Initialize DVC'\n\n# Track your dataset\ndvc add data/raw/train.csv\ngit add data/raw/train.csv.dvc .gitignore\ngit commit -m 'Add training dataset v1'\n\n# Store data remotely (Google Drive = free!)\ndvc remote add -d gdrive_remote gdrive://YOUR_FOLDER_ID\ndvc push  # Uploads data to Google Drive\n\n# Define your pipeline in dvc.yaml\nstages:\n  preprocess:\n    cmd: python src/preprocess.py\n    deps:\n      - data/raw/train.csv\n      - src/preprocess.py\n    params:\n      - params.yaml:\n        - preprocessing.test_size\n    outs:\n      - data/processed/train_clean.csv\n  \n  train:\n    cmd: python src/train.py\n    deps:\n      - data/processed/train_clean.csv\n      - src/train.py\n    params:\n      - params.yaml:\n        - model.n_estimators\n        - model.max_depth\n    outs:\n      - models/model.pkl\n    metrics:\n      - metrics.json:\n          cache: false\n\n# Run pipeline (only reruns changed stages!)\ndvc repro\n\n# See what changed\ndvc dag           # Visualize pipeline\ndvc metrics show  # Show all metrics"},
        {step:"Capstone: Full End-to-End MLOps Pipeline",desc:"BUILD THE GOLD STANDARD ML PRODUCTION PIPELINE.\n\nSYSTEM REQUIREMENTS:\n\n1. DATA LAYER:\n✓ Data ingestion from CSV + API source\n✓ Great Expectations for data validation\n  (validate: no nulls in target, correct data types, value ranges)\n✓ DVC for data versioning + Google Drive remote storage\n✓ Automatic data drift detection (evidently-ai library)\n\n2. TRAINING LAYER:\n✓ Optuna for hyperparameter optimization (100 trials)\n✓ MLflow experiment tracking (log everything!)\n✓ 5-fold cross-validation with stratification\n✓ Multiple model comparison (RF, XGBoost, LightGBM)\n✓ Model evaluation threshold: must beat accuracy > 0.90\n\n3. DEPLOYMENT LAYER:\n✓ FastAPI REST endpoint\n✓ Pydantic input validation\n✓ Health check + version endpoints\n✓ Docker containerization\n✓ Deploy to Railway.app (free tier)\n\n4. CI/CD LAYER (GitHub Actions):\n✓ On every push: pytest + data validation + type checking\n✓ On main merge: train model → evaluate → deploy if better\n✓ Slack/email notification on pipeline failure\n\n5. MONITORING LAYER:\n✓ Log all predictions to database\n✓ Weekly drift report (Evidently AI HTML report)\n✓ Alert if accuracy drops below threshold\n✓ Automatic retraining trigger on drift detection\n\nDELIVERABLE: GitHub repo with full code + README + screenshots + deployed API URL\nXP: +1000. This is senior ML engineer territory."}
       ]},
      {id:"t13",icon:"🧙",title:"Track 7: LLM Engineering",xp:1200,color:"#A29BFE",
       resources:["https://ollama.ai","https://python.langchain.com","https://docs.llamaindex.ai","https://huggingface.co","https://groq.com"],
       steps:[
        {step:"LLM Fundamentals & Running Models Locally",desc:"WHAT IS AN LLM:\n• Transformer decoder trained on vast text corpora\n• Autoregressive: predicts next token given all previous tokens\n• Scale: billions of parameters, trained on trillions of tokens\n• Emergent abilities: reasoning, coding, translation appear at scale\n\nKEY CONCEPTS:\n• Tokenization: text → integer IDs via BPE algorithm\n• Context window: max tokens in input+output (4K to 128K+)\n• Temperature: 0 = deterministic, 0.7 = creative, >1 = chaotic\n• Top-p (nucleus) sampling: dynamic vocab cutoff for quality\n• System prompt: instructions before the conversation\n\nRUN LLMs LOCALLY FOR FREE WITH OLLAMA:\n# Install: ollama.ai\ncurl -fsSL https://ollama.ai/install.sh | sh\n\n# Pull and run models\nollama pull llama3.1      # Meta's 8B model — excellent quality\nollama pull codellama     # Code-specialized model\nollama pull mistral       # Fast, efficient, great for RAG\nollama pull phi3          # Microsoft's tiny but powerful model\n\n# Chat in terminal\nollama run llama3.1\n\n# Python API\nimport ollama\nresponse = ollama.chat(\n    model='llama3.1',\n    messages=[{'role':'user', 'content':'Explain backpropagation simply'}]\n)\nprint(response['message']['content'])"},
        {step:"Prompt Engineering Mastery",desc:"The art of communicating with LLMs:\n\n1. ZERO-SHOT: just ask directly\n   Prompt: 'Classify this review as Positive or Negative: ...'\n\n2. FEW-SHOT: provide examples first\n   Prompt: 'Classify sentiment.\n   Review: Great product! → Positive\n   Review: Terrible quality → Negative\n   Review: {new_review} →'\n\n3. CHAIN OF THOUGHT (CoT): force step-by-step reasoning\n   Add: 'Let's think through this step by step:'\n   Effect: Massive accuracy improvement on reasoning tasks\n\n4. SELF-CONSISTENCY: sample multiple reasoning paths\n   → Generate 5 different CoT solutions\n   → Take majority vote on final answer\n   → More accurate than single chain of thought\n\n5. STRUCTURED OUTPUT: force JSON output\n   System: 'You always respond with valid JSON only. No extra text.'\n   Format: {'sentiment': 'positive', 'confidence': 0.95, 'keywords': [...]}\n\n6. REACT PATTERN (Reasoning + Acting):\n   Thought: I need to find the current weather in Dhaka\n   Action: search_web('Dhaka weather today')\n   Observation: 32°C, sunny\n   Thought: Now I can answer\n   Answer: It is currently 32°C and sunny in Dhaka.\n\nBEST PRACTICES:\n✓ Be specific, not vague\n✓ Specify output format explicitly\n✓ Use XML tags: <context>, <question>, <format>\n✓ State negative constraints: 'Do NOT include...'\n✓ Assign a role: 'You are an expert ML engineer...'"},
        {step:"RAG: Retrieval-Augmented Generation",desc:"RAG = LLM + Knowledge Base\nSolves: knowledge cutoff, hallucination, domain specificity\n\nRAG PIPELINE:\n1. INGESTION (offline):\n   a. Load documents (PDF, markdown, web, code)\n   b. Split into chunks (512 tokens, 50 overlap)\n   c. Embed chunks → dense vectors\n   d. Store vectors in vector database\n\n2. RETRIEVAL (online, at query time):\n   a. Embed user query\n   b. Find top-k most similar chunks (cosine similarity)\n   c. Optionally rerank with cross-encoder\n\n3. AUGMENTATION + GENERATION:\n   a. Inject retrieved chunks into LLM context\n   b. LLM generates answer grounded in retrieved text\n   c. Return answer + source citations\n\n# Simple RAG with LangChain + Ollama (100% FREE)\npip install langchain langchain-community chromadb pypdf\n\nfrom langchain_community.vectorstores import Chroma\nfrom langchain_community.embeddings import OllamaEmbeddings\nfrom langchain_community.llms import Ollama\nfrom langchain.text_splitter import RecursiveCharacterTextSplitter\nfrom langchain_community.document_loaders import PyPDFLoader\n\n# Load and split documents\nloader = PyPDFLoader('research_paper.pdf')\ndocs = loader.load()\nsplitter = RecursiveCharacterTextSplitter(chunk_size=512, chunk_overlap=50)\nchunks = splitter.split_documents(docs)\n\n# Create vector store\nembedding = OllamaEmbeddings(model='llama3.1')\nvectorstore = Chroma.from_documents(chunks, embedding, persist_directory='./db')\n\n# Query the knowledge base\nretriever = vectorstore.as_retriever(search_kwargs={'k': 5})\nquery = 'What is the main contribution of this paper?'\nrelevant_docs = retriever.get_relevant_documents(query)\n\n# Generate answer with context\nllm = Ollama(model='llama3.1')\ncontext = '\\n\\n'.join([d.page_content for d in relevant_docs])\nprompt = f'Context: {context}\\n\\nQuestion: {query}\\n\\nAnswer:'\nanswer = llm.invoke(prompt)\nprint(answer)"},
        {step:"Capstone: Production RAG System",desc:"Build a production-quality, evaluated RAG system:\n\nSYSTEM ARCHITECTURE:\n\nDocument Ingestion Pipeline:\n✓ Supported formats: PDF, Markdown, Web URLs, .txt\n✓ Smart chunking: compare fixed / sentence / semantic splitting\n✓ Multiple embedding models tested: nomic-embed-text, mxbai-embed-large\n✓ Vector store: Chroma (local dev) + Pinecone free tier (cloud)\n\nRetrieval Enhancement:\n✓ Hybrid retrieval: dense (semantic) + sparse (BM25 keyword)\n✓ Reranking: ms-marco cross-encoder reranks top-20 → top-5\n✓ Query expansion: generate 3 alternative phrasings per query\n✓ Contextual compression: extract only relevant sentences\n\nGeneration:\n✓ Primary LLM: Ollama llama3.1 (local, free)\n✓ Fallback: Groq API (free tier, ultra-fast cloud)\n✓ Prompt template with XML structure\n✓ Citation: include source document + page number\n\nEvaluation (RAGAS framework):\n✓ Faithfulness: is the answer supported by retrieved context?\n✓ Answer Relevancy: does the answer address the question?\n✓ Context Precision: are retrieved docs actually relevant?\n✓ Context Recall: was all necessary info retrieved?\n\nOptimization:\n✓ Embedding cache: don't re-embed unchanged documents\n✓ Query result cache: Redis or dictionary cache for repeated queries\n✓ Async processing: FastAPI + asyncio for concurrent requests\n\nDeployment:\n✓ FastAPI backend with Swagger UI\n✓ Simple Gradio frontend\n✓ Deploy to Hugging Face Spaces (free!)\n✓ GitHub repo + architecture diagram + evaluation results\n\nSuggested domain: Q&A over Bangladeshi law documents or AI research papers\nXP: +1200"}

      {id:"t14",icon:"👁️",title:"Track 8: Computer Vision Engineering",xp:1000,color:"#E17055",
       resources:["https://docs.ultralytics.com","https://albumentations.ai","https://pytorch.org/vision","https://huggingface.co/models","https://roboflow.com"],
       steps:[
        {step:"Computer Vision Fundamentals",desc:"Images as data — the basics:\n\nIMAGE REPRESENTATION:\n• Grayscale: 2D array → shape (H, W), values 0-255\n• RGB: 3D array → shape (H, W, 3)\n• PyTorch convention: (Channels, H, W)\n• Normalization: (pixel - mean) / std\n• ImageNet stats: mean=[0.485, 0.456, 0.406], std=[0.229, 0.224, 0.225]\n\nBASIC OPERATIONS WITH OPENCV:\nimport cv2\nimport numpy as np\n\n# Load image\nimg = cv2.imread('photo.jpg')              # BGR by default!\nimg_rgb = cv2.cvtColor(img, cv2.COLOR_BGR2RGB)\n\n# Transform operations\nresized = cv2.resize(img, (224, 224))        # standard size for CNNs\nrotated = cv2.rotate(img, cv2.ROTATE_90_CLOCKWISE)\ncropped = img[100:400, 200:600]              # [y1:y2, x1:x2]\nflipped = cv2.flip(img, 1)                  # 1=horizontal\n\n# Color space conversions\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nhsv = cv2.cvtColor(img, cv2.COLOR_BGR2HSV)\n\n# Edge detection\nblurred = cv2.GaussianBlur(gray, (5,5), 0)\nedges = cv2.Canny(blurred, 50, 150)\n\n# Display with matplotlib\nimport matplotlib.pyplot as plt\nplt.figure(figsize=(12,4))\nfor i, (name, image) in enumerate([\n    ('Original', img_rgb), ('Edges', edges), ('Resized', resized)\n]):\n    plt.subplot(1, 3, i+1)\n    plt.imshow(image if len(image.shape)==3 else image, cmap='gray' if len(image.shape)==2 else None)\n    plt.title(name)\n    plt.axis('off')\nplt.tight_layout()\nplt.show()"},
        {step:"Transfer Learning — The Practical Superpower",desc:"Transfer learning: use features learned on ImageNet for your task.\nWhy: ImageNet models learn universal visual features (edges → textures → shapes → objects).\nResult: 10x faster training, works with 100x less data.\n\nTHE TRANSFER LEARNING WORKFLOW:\n\n1. CHOOSE A BASE MODEL:\n• EfficientNet-B0/B3: best accuracy/speed tradeoff\n• ResNet-50: reliable workhorse, well-understood\n• ViT-B/16: vision transformer, state-of-the-art accuracy\n• MobileNetV3: tiny, fast, for edge deployment\n\n2. FREEZE BASE, TRAIN HEAD:\nimport torch\nimport torchvision.models as models\n\nmodel = models.efficientnet_b3(pretrained=True)\n\n# Freeze pretrained layers\nfor param in model.parameters():\n    param.requires_grad = False\n\n# Replace final layer with your task-specific head\nn_classes = 5  # your number of classes\nmodel.classifier = torch.nn.Sequential(\n    torch.nn.Dropout(0.3),\n    torch.nn.Linear(model.classifier[1].in_features, n_classes)\n)\n\n# Only train the new head\noptimizer = torch.optim.AdamW(model.classifier.parameters(), lr=1e-3)\n\n3. FINE-TUNE ENTIRE MODEL:\n# After head converges, unfreeze and fine-tune\nfor param in model.parameters():\n    param.requires_grad = True\n\n# Use much lower learning rate for pretrained layers!\noptimizer = torch.optim.AdamW([\n    {'params': model.features.parameters(), 'lr': 1e-5},  # low LR!\n    {'params': model.classifier.parameters(), 'lr': 1e-3}  # higher LR\n])"},
        {step:"Object Detection with YOLOv8",desc:"YOLO = You Only Look Once\nReal-time object detection in a single forward pass.\n\npip install ultralytics\n\nfrom ultralytics import YOLO\n\n# ── INFERENCE on existing model ──\nmodel = YOLO('yolov8n.pt')  # nano = fastest, smallest\n                             # s, m, l, x = larger + more accurate\n\n# Run on image\nresults = model.predict('street.jpg', conf=0.5, iou=0.45)\nresults[0].show()  # Display image with bounding boxes\nresults[0].save('output.jpg')\n\n# Get detection data\nfor box in results[0].boxes:\n    class_id = int(box.cls)\n    confidence = float(box.conf)\n    x1, y1, x2, y2 = box.xyxy[0].tolist()\n    print(f'{model.names[class_id]}: {confidence:.2%} at [{x1:.0f},{y1:.0f},{x2:.0f},{y2:.0f}]')\n\n# Run on video\nmodel.predict('traffic.mp4', save=True, show=True)\n\n# ── CUSTOM TRAINING ──\n# Prepare dataset in YOLO format (Roboflow can export this!)\n# dataset.yaml:\n# train: data/images/train/\n# val: data/images/val/\n# nc: 3  # number of classes\n# names: ['cat', 'dog', 'bird']\n\nmodel = YOLO('yolov8n.pt')  # start from pretrained\nresults = model.train(\n    data='dataset.yaml',\n    epochs=100,\n    imgsz=640,\n    batch=16,\n    optimizer='AdamW',\n    lr0=0.001,\n    device='cuda'  # or 'cpu'\n)\n\n# Evaluate\nmetrics = model.val()\nprint(f'mAP50: {metrics.box.map50:.4f}')\nprint(f'mAP50-95: {metrics.box.map:.4f}')"},
        {step:"Capstone: Custom Vision Application",desc:"BUILD AND DEPLOY A REAL COMPUTER VISION SYSTEM.\n\nCHOOSE YOUR PROJECT:\nA) Plant disease detector from leaf photos\nB) Waste sorting system (recyclable vs non-recyclable)\nC) Road pothole detector for city infrastructure\nD) Face mask detector (post-COVID practical use)\nE) Custom defect detection for manufacturing QC\nF) Wildlife camera trap species classifier\n\nFULL REQUIREMENTS:\n\nDATA:\n✓ Collect minimum 500 images (use Roboflow for annotation)\n✓ Split: 70% train / 15% val / 15% test\n✓ Document data collection methodology\n\nPREPROCESSING:\n✓ Albumentations augmentation pipeline:\n  RandomFlip, RandomRotate90, ColorJitter,\n  RandomBrightnessContrast, GaussNoise, CoarseDropout\n✓ Normalization with ImageNet statistics\n\nMODELING:\n✓ Baseline: ResNet-50 transfer learning\n✓ Advanced: EfficientNet or YOLOv8 (if detection)\n✓ Hyperparameter tuning: 20 Optuna trials minimum\n\nEVALUATION:\n✓ Classification: accuracy, F1, confusion matrix, ROC-AUC\n✓ Detection: mAP@50, mAP@50-95, per-class AP\n✓ Error analysis: visualize worst predictions\n\nDEPLOYMENT:\n✓ ONNX export for fast inference\n✓ FastAPI endpoint with file upload\n✓ Gradio demo UI\n✓ Deploy to Hugging Face Spaces (FREE!)\n✓ Model card on HuggingFace Hub\n✓ Write-up blog post on Medium or Substack\n\nXP: +1000"}
       ]},
      {id:"t15",icon:"📝",title:"Track 9: NLP Engineering",xp:1000,color:"#FDCB6E",
       resources:["https://huggingface.co/course","https://nlp.stanford.edu/courses/cs224n","https://spacy.io","https://nltk.org","https://datasets.huggingface.co"],
       steps:[
        {step:"NLP Foundations & Text Preprocessing",desc:"Natural Language Processing from ground up:\n\nTEXT PREPROCESSING PIPELINE:\n\n1. Tokenization: 'Hello world' → ['Hello', 'world']\n2. Lowercasing: 'Hello' → 'hello'\n3. Stop word removal: ['the', 'is', 'in'] removed\n4. Stemming: 'running' → 'run' (rule-based, fast, rough)\n5. Lemmatization: 'better' → 'good' (dictionary-based, accurate)\n6. Subword tokenization (BPE): 'unhappiness' → ['un', 'happiness']\n\nCLASSICAL TEXT REPRESENTATIONS:\n\n# Bag of Words\nfrom sklearn.feature_extraction.text import CountVectorizer\nvectorizer = CountVectorizer(max_features=10000)\nX = vectorizer.fit_transform(texts)  # sparse matrix\n\n# TF-IDF (term frequency × inverse document frequency)\nfrom sklearn.feature_extraction.text import TfidfVectorizer\ntfidf = TfidfVectorizer(\n    max_features=50000,\n    ngram_range=(1, 2),  # unigrams + bigrams\n    min_df=2,            # ignore very rare terms\n    max_df=0.95          # ignore very common terms\n)\nX = tfidf.fit_transform(texts)\n\n# TF-IDF + Logistic Regression = Strong NLP baseline!\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.linear_model import LogisticRegression\n\npipeline = Pipeline([\n    ('tfidf', TfidfVectorizer(max_features=50000, ngram_range=(1,2))),\n    ('clf', LogisticRegression(C=5.0, max_iter=1000))\n])\npipeline.fit(X_train_text, y_train)\nprint(f'Test accuracy: {pipeline.score(X_test_text, y_test):.4f}')\n\n# Always establish this baseline BEFORE trying transformers!\n# If BERT doesn't significantly beat TF-IDF+LR, reconsider."},
        {step:"HuggingFace Transformers",desc:"pip install transformers datasets accelerate\n\n# ── PIPELINE API (easiest way to use transformers) ──\nfrom transformers import pipeline\n\n# Sentiment Analysis (BERT-based)\nsentiment = pipeline('sentiment-analysis')\nresult = sentiment('I absolutely love learning AI engineering!')\n# [{'label': 'POSITIVE', 'score': 0.9998}]\n\n# Zero-shot Classification (no fine-tuning needed!)\nclassifier = pipeline('zero-shot-classification',\n                       model='facebook/bart-large-mnli')\nresult = classifier(\n    'The Bangladesh cricket team won the series against Pakistan',\n    candidate_labels=['sports', 'politics', 'technology', 'business', 'entertainment']\n)\nprint(result['labels'][0], result['scores'][0])  # sports, 0.987\n\n# Named Entity Recognition\nner = pipeline('token-classification',\n               model='dbmdz/bert-large-cased-finetuned-conll03-english',\n               aggregation_strategy='simple')\nentities = ner('Mushfiqul Alam Nasif studies at BAUST in Khulna, Bangladesh')\nfor e in entities:\n    print(f'{e[\"word\"]:20} {e[\"entity_group\"]:5} {e[\"score\"]:.3f}')\n# Mushfiqul Alam Nasif  PER   0.999\n# BAUST                 ORG   0.987\n# Khulna                LOC   0.994\n# Bangladesh            LOC   0.991\n\n# Summarization\nsummarizer = pipeline('summarization', model='facebook/bart-large-cnn')\nlong_text = '...your long article text here...'\nsummary = summarizer(long_text, max_length=150, min_length=50)\nprint(summary[0]['summary_text'])\n\n# Text Generation\ngenerator = pipeline('text-generation', model='gpt2')\noutput = generator('The future of AI engineering in Bangladesh is',\n                   max_new_tokens=100, temperature=0.8)\nprint(output[0]['generated_text'])"},
        {step:"BERT Fine-tuning for Classification",desc:"Fine-tune BERT for any text classification task:\n\nfrom transformers import AutoTokenizer, AutoModelForSequenceClassification\nfrom transformers import TrainingArguments, Trainer, DataCollatorWithPadding\nfrom datasets import Dataset\nimport numpy as np\n\nMODEL_NAME = 'bert-base-uncased'  # or 'roberta-base' for better performance\ntokenizer = AutoTokenizer.from_pretrained(MODEL_NAME)\nmodel = AutoModelForSequenceClassification.from_pretrained(\n    MODEL_NAME,\n    num_labels=2,  # binary classification\n    id2label={0: 'NEGATIVE', 1: 'POSITIVE'},\n    label2id={'NEGATIVE': 0, 'POSITIVE': 1}\n)\n\n# Tokenize dataset\ndef tokenize_function(examples):\n    return tokenizer(\n        examples['text'],\n        padding='max_length',\n        truncation=True,\n        max_length=512\n    )\n\ndataset = Dataset.from_dict({'text': texts, 'label': labels})\ntokenized = dataset.map(tokenize_function, batched=True, remove_columns=['text'])\ntrain_ds, eval_ds = tokenized.train_test_split(test_size=0.15).values()\n\n# Metrics\nfrom sklearn.metrics import accuracy_score, f1_score\ndef compute_metrics(eval_pred):\n    logits, labels = eval_pred\n    predictions = np.argmax(logits, axis=-1)\n    return {\n        'accuracy': accuracy_score(labels, predictions),\n        'f1': f1_score(labels, predictions, average='weighted')\n    }\n\n# Training\nargs = TrainingArguments(\n    output_dir='./bert-finetuned',\n    num_train_epochs=3,\n    per_device_train_batch_size=16,\n    per_device_eval_batch_size=32,\n    learning_rate=2e-5,      # Low LR is critical for fine-tuning!\n    warmup_ratio=0.1,\n    weight_decay=0.01,\n    evaluation_strategy='epoch',\n    save_strategy='best',\n    load_best_model_at_end=True,\n    metric_for_best_model='f1',\n    report_to='none'\n)\n\ntrainer = Trainer(\n    model=model,\n    args=args,\n    train_dataset=train_ds,\n    eval_dataset=eval_ds,\n    compute_metrics=compute_metrics,\n    data_collator=DataCollatorWithPadding(tokenizer)\n)\ntrainer.train()\n\n# Push to HuggingFace Hub (share your model!)\ntrainer.push_to_hub('your-username/bert-sentiment-classifier')"},
        {step:"Capstone: End-to-End NLP Application",desc:"BUILD A COMPLETE MULTI-TASK NLP SYSTEM.\n\nSUGGESTED PROJECT: Bengali News Analyzer\n(Perfect for Bangladesh context! Unique portfolio piece!)\n\nOR: Legal Document Analyzer / Medical Note Summarizer / Finance Sentiment Tracker\n\nSYSTEM TASKS (implement all 4):\n\nTask 1: Document Classification\n✓ Categories: politics / sports / business / technology / entertainment\n✓ Model: fine-tuned multilingual BERT (handles Bengali!)\n✓ Target: F1 > 0.90\n\nTask 2: Named Entity Recognition\n✓ Extract: persons, organizations, locations, dates\n✓ Model: fine-tuned BERT-NER\n✓ Evaluation: entity-level F1 score\n\nTask 3: Text Summarization\n✓ Abstractive: BART or T5 fine-tuned on your domain\n✓ Evaluation: ROUGE-1, ROUGE-2, ROUGE-L scores\n\nTask 4: Semantic Search\n✓ Encode all docs with sentence-transformers\n✓ Store in FAISS vector index\n✓ Return most similar articles to any query\n\nDEPLOYMENT:\n✓ FastAPI with 4 endpoints (one per task)\n✓ Streamlit or Gradio frontend\n✓ Deploy to Hugging Face Spaces (free!)\n✓ All models on HuggingFace Hub with model cards\n✓ GitHub repo with architecture diagram\n✓ Medium blog post: 'Building a Bengali NLP System'\n\nXP: +1000"}

      {id:"t16",icon:"📄",title:"Research Paper Mastery System",xp:1000,color:"#A29BFE",
       resources:["https://arxiv.org","https://paperswithcode.com","https://wandb.ai","https://overleaf.com","https://zotero.org"],
       steps:[
        {step:"How to Read a Research Paper — The 3-Pass Method",desc:"PASS 1 — Survey (5-10 minutes):\nRead: title, abstract, intro paragraph, conclusion, section headings\nIgnore: equations, experiments, related work detail\nAnswer after pass 1:\n• What is the problem being solved?\n• What is the proposed approach?\n• What are the claimed results?\n• Is this paper relevant to me?\n\nPASS 2 — Deep Read (1-2 hours):\nRead everything carefully except deep proofs\nUnderstand all figures and tables (often the paper's heart)\nNote every reference you don't understand\nAnnotate: highlight key claims, mark unclear sections\nAnswer after pass 2:\n• What is the key insight or innovation?\n• What assumptions do they make?\n• Do the results support the claims?\n\nPASS 3 — Reproduce (4-8 hours):\nUnderstand every equation. Derive them yourself.\nIdentify all implementation details\nNote what's ambiguous or missing\nAnswer after pass 3:\n• Could you reimplement this from the paper alone?\n• What would you try differently?\n• What follow-up work does this suggest?\n\nPAPER READING LOG TEMPLATE:\nTitle: ___________\nAuthors + Year: ___\nProblem: _________\nApproach: ________\nKey Innovation: ___\nResults: _________\nLimitations: _____\nNext papers to read: ___"},
        {step:"Essential Papers Reading Roadmap",desc:"READ IN THIS ORDER:\n\n─── FOUNDATION (read before anything else) ───\n1. Attention Is All You Need (2017) — Vaswani et al.\n   arxiv.org/abs/1706.03762\n   The transformer architecture. Everything builds on this.\n\n2. Deep Residual Learning (ResNet) (2015) — He et al.\n   arxiv.org/abs/1512.03385\n   Skip connections. Enabled very deep networks.\n\n3. Generative Adversarial Networks (2014) — Goodfellow et al.\n   arxiv.org/abs/1406.2661\n   The idea of adversarial training. Changed ML forever.\n\n─── LANGUAGE MODELS ───\n4. BERT (2019) — Devlin et al.\n   arxiv.org/abs/1810.04805\n5. Language Models are Few-Shot Learners (GPT-3) (2020)\n   arxiv.org/abs/2005.14165\n6. Training language models to follow instructions (InstructGPT)\n   arxiv.org/abs/2203.02155\n\n─── TRAINING TECHNIQUES ───\n7. Dropout (2014) — Srivastava et al.\n8. Batch Normalization (2015) — Ioffe & Szegedy\n9. Adam Optimizer (2015) — Kingma & Ba\n10. LoRA (2021) — Hu et al. — Low-Rank Adaptation for fine-tuning\n\n─── RECENT ADVANCES ───\n11. Scaling Laws for Neural Language Models (2020)\n12. LLaMA (2023) — Touvron et al.\n13. Mamba (2023) — state space models\n14. Mixtral MoE (2024) — Mixture of Experts\n\nWHERE TO FIND PAPERS:\n• arxiv.org — preprints, daily new papers\n• paperswithcode.com — papers + code + SOTA leaderboards\n• semanticscholar.org — citation graphs, related work\n• scholar.google.com — broad academic search"},
        {step:"Paper Reproduction System",desc:"Reproducing papers = the highest-value ML portfolio activity.\nA reproduced paper on your GitHub beats 10 tutorial projects.\n\nFOR EACH PAPER, CREATE THIS STRUCTURED LOG:\n\n# Paper Reproduction: Attention Is All You Need\n\n## Paper Info\n- **Title**: Attention Is All You Need\n- **Authors**: Vaswani et al.\n- **Year**: 2017\n- **Venue**: NeurIPS 2017\n- **ArXiv**: arxiv.org/abs/1706.03762\n- **GitHub**: github.com/your-username/transformer-from-scratch\n\n## Original Claims\n- [ ] Transformers outperform RNNs on WMT 2014 EN→DE\n- [ ] BLEU score: 28.4 on EN→DE translation\n- [ ] Training time: 3.5 days on 8 P100 GPUs\n- [ ] 12x fewer FLOPs than best RNN model\n\n## My Implementation\n- Framework: PyTorch\n- Hardware: Google Colab T4 (free)\n- Dataset: Multi30k (smaller, feasible on free GPU)\n- Training time: 4 hours on Colab T4\n\n## My Results\n- BLEU score: 24.1 (vs 28.4 claimed)\n- Gap explanation: smaller dataset, fewer parameters, shorter training\n- Qualitative: translations are fluent and grammatically correct\n\n## Deviations from Paper\n1. Smaller model (256 dim vs 512 dim) — memory constraint\n2. Multi30k dataset vs WMT 2014 — feasibility\n3. 10 epochs vs original longer training\n\n## Key Insights Learned\n- Positional encoding is crucial — model fails without it\n- Label smoothing (ε=0.1) significantly improves BLEU\n- Warmup learning rate schedule is essential for stability\n\nSTART SIMPLE: reproduce the results table of any paper using their released code. Then try to reimplement from scratch."},
        {step:"Research Writing & LaTeX Basics",desc:"Writing your first research paper:\n\nTOOL: Overleaf (overleaf.com) — free, online LaTeX editor\nNo installation. Collaborate in browser. Exports to PDF.\n\n% Basic LaTeX research paper template\n\\documentclass{article}\n\\usepackage{arxiv}  % arXiv paper style\n\\usepackage{amsmath,amssymb}  % math\n\\usepackage{graphicx}  % figures\n\\usepackage{booktabs}  % professional tables\n\\usepackage{hyperref}  % clickable links\n\n\\title{My Research Title}\n\\author{Mushfiqul Alam Nasif \\\\ BAUST, Khulna, Bangladesh \\\\ \\texttt{email@baust.edu.bd}}\n\n\\begin{document}\n\\maketitle\n\n\\begin{abstract}\n[Problem statement. Approach. Key results. Significance.]\n\\end{abstract}\n\n\\section{Introduction}\n% Motivation, related work gap, contributions (numbered list)\n\n\\section{Method}\n% Your approach, architecture, training procedure\n\\begin{equation}\n    \\text{Attention}(Q, K, V) = \\text{softmax}\\left(\\frac{QK^T}{\\sqrt{d_k}}\\right)V\n\\end{equation}\n\n\\section{Experiments}\n% Datasets, baselines, results table\n\\begin{table}[h]\n\\begin{tabular}{lcc}\n\\toprule\nMethod & Accuracy & F1 \\\\\n\\midrule\nBaseline & 0.82 & 0.79 \\\\\nOurs & \\textbf{0.91} & \\textbf{0.89} \\\\\n\\bottomrule\n\\end{tabular}\n\\end{table}\n\n\\section{Conclusion}\n% Summary, limitations, future work\n\n\\bibliography{references}\n\\end{document}\n\nCITATION MANAGER: Zotero (zotero.org) — free, open source\nImports from DOI/URL, exports BibTeX for LaTeX"}
       ]},
      {id:"t17",icon:"🤖",title:"AI-Powered Research Tools",xp:800,color:"#00CEC9",

        {step:"ArXiv Paper Summarizer",desc:"Auto-summarize research papers from ArXiv:\n\nimport requests\nfrom bs4 import BeautifulSoup\nimport ollama\nimport json\n\ndef fetch_arxiv_paper(arxiv_id: str) -> dict:\n    \"\"\"Fetch paper details from ArXiv.\"\"\"\n    url = f'https://arxiv.org/abs/{arxiv_id}'\n    headers = {'User-Agent': 'Mozilla/5.0'}\n    r = requests.get(url, headers=headers)\n    soup = BeautifulSoup(r.text, 'html.parser')\n    \n    return {\n        'title': soup.find('h1', class_='title').text.replace('Title:', '').strip(),\n        'authors': soup.find('div', class_='authors').text.strip(),\n        'abstract': soup.find('blockquote', class_='abstract').text.replace('Abstract:', '').strip(),\n        'url': url\n    }\n\nSUMMARY_PROMPT = \"\"\"\nAnalyze this ML research paper and provide a structured summary in JSON format:\n\nPaper: {title}\nAuthors: {authors}\nAbstract: {abstract}\n\nRespond ONLY with valid JSON, no other text:\n{{\n  \"problem\": \"What specific problem does this paper solve?\",\n  \"approach\": \"What is their method in 2-3 sentences?\",\n  \"key_innovation\": \"What is genuinely new here?\",\n  \"results\": [\"key result 1\", \"key result 2\"],\n  \"limitations\": \"What are the main limitations?\",\n  \"who_should_read\": \"Who benefits most from reading this?\",\n  \"related_papers\": [\"suggestion 1\", \"suggestion 2\"],\n  \"difficulty\": \"beginner|intermediate|advanced\",\n  \"reproducibility_estimate\": \"easy|medium|hard|very_hard\"\n}}\n\"\"\"\n\ndef summarize_paper(arxiv_id: str) -> dict:\n    paper = fetch_arxiv_paper(arxiv_id)\n    prompt = SUMMARY_PROMPT.format(**paper)\n    response = ollama.generate(model='llama3.1', prompt=prompt)\n    \n    try:\n        summary = json.loads(response['response'])\n    except json.JSONDecodeError:\n        summary = {'raw': response['response']}\n    \n    return {**paper, **summary}\n\n# Usage\nsummary = summarize_paper('1706.03762')  # Attention Is All You Need\nprint
