      {id:"t8",icon:"🔢",title:"Mathematics for ML",xp:900,color:"#f87171",

       steps:[
        {step:"Linear Algebra Essentials",desc:"The 4 things you MUST understand deeply:\n\n1. MATRIX MULTIPLICATION\nNot just 'how' but 'why': it's composing transformations.\nA @ B means: first apply B, then apply A.\n\n2. EIGENVALUES & EIGENVECTORS\nPCA uses them. They represent 'stable directions'.\nIf Av = λv, then v is an eigenvector.\n\n3. SVD (Singular Value Decomposition)\nA = UΣV^T\nUsed in: PCA, recommendation systems, image compression\n\n4. MATRIX RANK\nTells you the 'information content' of a matrix.\nRank deficiency = linearly dependent features = problem."},
        {step:"Calculus & Gradient Descent",desc:"The ONE equation that runs all of ML:\n\nw = w - α ∇L(w)\n\nWhere:\n• w = model parameters (what we're updating)\n• α = learning rate (how big each step is)\n• ∇L(w) = gradient of loss (which direction is downhill)\n\nThe chain rule makes backpropagation possible:\nd/dx [f(g(x))] = f'(g(x)) · g'(x)\n\nFor neural networks with n layers:\n∂L/∂w₁ = ∂L/∂aₙ · ∂aₙ/∂aₙ₋₁ · ... · ∂a₂/∂w₁\n\nThis is computed automatically by PyTorch's autograd."},
        {step:"Probability & Statistics",desc:"THE MOST IMPORTANT DISTRIBUTIONS IN ML:\n\n1. Gaussian N(μ, σ²): Weight initialization, noise modeling\n2. Bernoulli: Binary classification output\n3. Categorical: Multi-class output (softmax)\n4. Uniform: Random initialization (Xavier)\n\nKEY CONCEPTS:\n• Bayes' theorem: P(A|B) = P(B|A)P(A)/P(B)\n• Maximum Likelihood Estimation (MLE)\n• KL Divergence: How different are two distributions?\n• Central Limit Theorem: Why Gaussian is everywhere"},
        {step:"Information Theory Basics",desc:"WHY THIS MATTERS FOR ML:\n\nEntropy H(X) = -Σ p(x) log p(x)\n→ Measures uncertainty in a distribution\n→ Decision trees maximize information gain (reduce entropy)\n\nCross-Entropy Loss = -Σ y_true · log(y_pred)\n→ THE most common classification loss\n→ Minimizing it = Maximum Likelihood Estimation\n\nMutual Information I(X;Y)\n→ How much does knowing X tell you about Y?\n→ Used in feature selection, representation learning\n\nKL Divergence KL(P||Q) = Σ p log(p/q)\n→ VAE uses this to regularize latent space"}
       ]},
      {id:"t9",icon:"🤖",title:"Machine Learning Core",xp:1000,color:"#34d399",

       steps:[
        {step:"Supervised Learning Algorithms",desc:"THE ML ALGORITHM DECISION TREE:\n\nLinear Regression → continuous output, linear relationship\nLogistic Regression → binary classification, interpretable\nDecision Tree → non-linear, highly interpretable, overfits\nRandom Forest → ensemble of trees, robust, great baseline\nGradient Boosting (XGBoost) → wins Kaggle competitions\nSVM → high-dimensional data, text classification\nKNN → simple, interpretable, slow on large data\n\nGOLDEN RULE:\nAlways start with the simplest model.\nLinear regression → Random Forest → XGBoost → Neural Net\nIf Random Forest doesn't beat linear, your features are wrong."},
        {step:"Model Evaluation & Validation",desc:"THE 5 THINGS TO ALWAYS CHECK:\n\n1. LEARNING CURVES\nPlot train loss AND validation loss vs epochs.\nOverfitting: train low, val high → add regularization\nUnderfitting: both high → bigger model, better features\n\n2. CROSS-VALIDATION\nfrom sklearn.model_selection import cross_val_score\nscores = cross_val_score(model, X, y, cv=5, scoring='roc_auc')\n\n3. CONFUSION MATRIX\nDon't just report accuracy on imbalanced datasets!\nUse: Precision, Recall, F1, AUC-ROC instead.\n\n4. FEATURE IMPORTANCE\nWhich features actually matter? Prune the rest.\n\n5. CALIBRATION\nAre probabilities well-calibrated? sklearn.calibration"},
        {step:"Feature Engineering (The Secret Weapon)",desc:"FEATURE ENGINEERING IS 80% OF ML:\n\n# Missing values\ndf['age_missing'] = df['age'].isna().astype(int)\ndf['age'] = df['age'].fillna(df['age'].median())\n\n# Date features\ndf['day_of_week'] = df['date'].dt.dayofweek\ndf['is_weekend'] = df['day_of_week'].isin([5,6]).astype(int)\ndf['hour'] = df['date'].dt.hour\n\n# Target encoding (careful: use k-fold)\nfor fold, (tr, val) in enumerate(kf.split(df)):\n    target_mean = df.iloc[tr].groupby('category')['target'].mean()\n    df.iloc[val, 'cat_encoded'] = df.iloc[val]['category'].map(target_mean)\n\n# Polynomial features\nfrom sklearn.preprocessing import PolynomialFeatures\npoly = PolynomialFeatures(degree=2, include_bias=False)\nX_poly = poly.fit_transform(X_numeric)"},
        {step:"Hyperparameter Tuning",desc:"3 STRATEGIES (in order of power):\n\n1. GRID SEARCH — for small search spaces\nfrom sklearn.model_selection import GridSearchCV\nparams = {'max_depth': [3,5,7], 'n_estimators': [100,300]}\ngrid = GridSearchCV(rf, params, cv=5, scoring='roc_auc')\ngrid.fit(X_train, y_train)\n\n2. RANDOM SEARCH — for large spaces (often beats grid!)\nfrom sklearn.model_selection import RandomizedSearchCV\n\n3. OPTUNA — modern Bayesian optimization\nimport optuna\ndef objective(trial):\n    lr = trial.suggest_float('lr', 1e-5, 1e-1, log=True)\n    depth = trial.suggest_int('max_depth', 3, 10)\n    model = XGBClassifier(lr=lr, max_depth=depth)\n    return cross_val_score(model, X, y, cv=3).mean()\n\nstudy = optuna.create_study(direction='maximize')\nstudy.optimize(objective, n_trials=100)"}

        {step:"PyTorch Fundamentals",desc:"import torch\nimport torch.nn as nn\n\n# The 3 sacred operations\nx = torch.randn(32, 784)          # Create tensor\ny = model(x)                       # Forward pass\nloss.backward()                    # Backward pass (autograd magic)\noptimizer.step()                   # Update weights\noptimizer.zero_grad()              # Reset gradients!\n\n# CRITICAL: Always check device\ndevice = torch.device('cuda' if torch.cuda.is_available() else 'cpu')\nmodel = model.to(device)\nx = x.to(device)\n\n# Tensor shapes are EVERYTHING\n# (batch, channels, height, width) for images\n# (batch, seq_len, d_model) for transformers"},
        {step:"Building Neural Networks",desc:"class MLP(nn.Module):\n    def __init__(self, input_dim, hidden_dim, output_dim):\n        super().__init__()\n        self.net = nn.Sequential(\n            nn.Linear(input_dim, hidden_dim),\n            nn.LayerNorm(hidden_dim),\n            nn.GELU(),\n            nn.Dropout(0.1),\n            nn.Linear(hidden_dim, hidden_dim),\n            nn.GELU(),\n            nn.Linear(hidden_dim, output_dim)\n        )\n    \n    def forward(self, x):\n        return self.net(x)\n\n# MODERN activations: GELU > ReLU for transformers\n# MODERN norm: LayerNorm > BatchNorm for most tasks\n# MODERN optimizer: AdamW, not Adam\n# MODERN scheduler: CosineAnnealingLR or OneCycleLR"},
        {step:"Training Loop — Professional Grade",desc:"def train_epoch(model, loader, optimizer, criterion, device):\n    model.train()\n    total_loss, total_correct = 0, 0\n    \n    for batch_idx, (X, y) in enumerate(loader):\n        X, y = X.to(device), y.to(device)\n        \n        # Forward\n        logits = model(X)\n        loss = criterion(logits, y)\n        \n        # Backward with gradient clipping\n        optimizer.zero_grad()\n        loss.backward()\n        torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n        optimizer.step()\n        scheduler.step()\n        \n        total_loss += loss.item()\n        total_correct += (logits.argmax(1) == y).sum().item()\n    \n    return total_loss / len(loader), total_correct / len(loader.dataset)"},
        {step:"CNNs & Transfer Learning",desc:"import torchvision.models as models\n\n# Transfer Learning Pattern (gold standard)\nmodel = models.resnet50(pretrained=True)\n\n# Freeze backbone\nfor param in model.parameters():\n    param.requires_grad = False\n\n# Replace classifier head\nmodel.fc = nn.Sequential(\n    nn.Linear(2048, 512),\n    nn.ReLU(),\n    nn.Dropout(0.3),\n    nn.Linear(512, num_classes)\n)\n\n# Unfreeze later for fine-tuning\n# optimizer = AdamW([\n#     {'params': model.backbone.parameters(), 'lr': 1e-5},\n#     {'params': model.fc.parameters(), 'lr': 1e-3}\n# ])\n\n# RULE: Transfer learning beats training from scratch\n# unless you have 1M+ samples for your task."}

      {id:"t11",icon:"🔬",title:"NLP & Transformers",xp:1100,color:"#c084fc",
       resources:["https://huggingface.co/docs","https://github.com/karpathy/nanoGPT","https://jalammar.github.io","https://nlp.seas.harvard.edu/annotated-transformer","https://lilianweng.github.io","https://docs.cohere.com/docs"],
       steps:[
        {step:"Attention Is All You Need",desc:"THE TRANSFORMER EXPLAINED:\n\nInput tokens → Embeddings + Positional Encoding\n          ↓\nMulti-Head Attention: Q, K, V matrices\nAttention(Q,K,V) = softmax(QK^T / √d_k) · V\n\nWHY IT WORKS:\n• Each token can 'attend' to all other tokens\n• No recurrence = fully parallelizable\n• Scales to billions of parameters\n\nKEY DIMENSIONS:\nd_model = embedding size (typically 512–4096)\nd_ff = feedforward size (typically 4× d_model)\nn_heads = attention heads (typically 8–32)\nn_layers = transformer blocks (typically 6–96)"},
        {step:"HuggingFace Transformers",desc:"from transformers import AutoTokenizer, AutoModel\nfrom transformers import pipeline\n\n# 3 lines to use any model\ntokenizer = AutoTokenizer.from_pretrained('bert-base-uncased')\nmodel = AutoModel.from_pretrained('bert-base-uncased')\n\n# Zero-shot classification\nclassifier = pipeline('zero-shot-classification')\nresult = classifier(\n    'This is a Python tutorial',\n    candidate_labels=['education', 'sports', 'politics']\n)\n\n# Fine-tuning with Trainer API\nfrom transformers import Trainer, TrainingArguments\ntraining_args = TrainingArguments(\n    output_dir='./results',\n    num_train_epochs=3,\n    per_device_train_batch_size=16,\n    warmup_steps=500,\n    weight_decay=0.01,\n)"},
        {step:"Build GPT from Scratch",desc:"The most important exercise in AI:\nFollow Karpathy's nanoGPT tutorial.\n\nYou will implement:\n1. Tokenization (BPE, character-level)\n2. Token + positional embeddings\n3. Multi-head self-attention\n4. Feedforward layer\n5. Layer normalization\n6. Residual connections\n7. Training loop with AdamW\n8. Temperature sampling for generation\n\nBy the end:\n• You understand every line of GPT-2\n• You can modify architecture\n• You understand why scaling works\n\nCode: github.com/karpathy/nanoGPT (~300 lines)"},
        {step:"RAG & LLM Applications",desc:"RAG = Retrieval Augmented Generation\n\nPipeline:\n1. Chunk documents into ~512 token segments\n2. Embed with text-embedding-ada-002 or local model\n3. Store in vector DB (Chroma, Pinecone, Qdrant)\n4. At query time: embed question → retrieve top-k chunks\n5. LLM generates answer using retrieved context\n\nfrom langchain.vectorstores import Chroma\nfrom langchain.embeddings import OpenAIEmbeddings\n\nvectorstore = Chroma.from_documents(\n    documents=chunks,\n    embedding=OpenAIEmbeddings()\n)\n\nretriever = vectorstore.as_retriever(search_kwargs={'k': 4})\n\n# Quality tips:\n# - Hybrid search (BM25 + semantic) beats pure semantic\n# - Re-rank retrieved chunks with cross-encoder\n# - HyDE: embed hypothetical answer, not question"}
       ]},

        {step:"FastAPI Model Serving",desc:"from fastapi import FastAPI\nfrom pydantic import BaseModel\nimport torch\nimport uvicorn\n\napp = FastAPI(title='ML Model API', version='1.0')\n\n# Load model at startup, not per-request!\n@app.on_event('startup')\nasync def load_model():\n    global model, tokenizer\n    model = torch.load('model.pt', map_location='cpu')\n    model.eval()\n\nclass PredictRequest(BaseModel):\n    text: str\n    temperature: float = 1.0\n\n@app.post('/predict')\nasync def predict(request: PredictRequest):\n    with torch.no_grad():\n        inputs = tokenizer(request.text, return_tensors='pt')\n        outputs = model(**inputs)\n        return {'prediction': outputs.logits.argmax(-1).item()}\n\nif __name__ == '__main__':\n    uvicorn.run(app, host='0.0.0.0', port=8000)"},

       steps:[
        {step:"Andrew Ng's 3-Pass Method",desc:"THE 3-PASS METHOD:\n\nPASS 1 (5-10 min): Bird's eye view\n• Read title, abstract, intro\n• Read section headings\n• Read conclusion\n• Glance at figures\nGoal: Know what the paper claims\n\nPASS 2 (1 hour): Careful read\n• Read everything except proofs\n• Mark what you don't understand\n• Note key figures/tables\nGoal: Understand the approach\n\nPASS 3 (4-5 hrs): Deep understanding\n• Reproduce every derivation\n• Identify every assumption\n• Think about what's missing\nGoal: Could you explain this to anyone?"},
        {step:"Must-Read Paper List",desc:"FOUNDATIONS (read these first):\n1. Attention Is All You Need (2017) — transformers\n2. BERT (2018) — bidirectional pre-training\n3. GPT-3 (2020) — few-shot learners\n4. ResNet (2015) — skip connections\n5. Dropout (2014) — regularization\n\nMODERN ESSENTIALS:\n6. LoRA (2021) — efficient fine-tuning\n7. Flash Attention (2022) — efficient attention\n8. Chinchilla (2022) — scaling laws\n9. LLaMA (2023) — open LLMs\n10. Retrieval-Augmented Generation (2020)\n\nWHERE TO FIND THEM:\n• arxiv.org/search\n• paperswithcode.com\n• Yannic Kilcher's YouTube explanations"},
        {step:"Reproducing a Paper",desc:"THE REPRODUCTION CHECKLIST:\n\n☐ Read paper 3 times (3-pass method)\n☐ Identify the core algorithm/architecture\n☐ List all hyperparameters and datasets\n☐ Create fresh repository\n☐ Implement from scratch (no copying)\n☐ Verify on small example first\n☐ Run on paper's dataset\n☐ Compare your results vs paper's Table 1\n☐ Write a blog post about discrepancies\n☐ Open-source your implementation\n\nGOOD FIRST PAPERS TO REPRODUCE:\n• Bag of Tricks for Image Classification (ResNet tricks)\n• A Simple Framework for Contrastive Learning (SimCLR)\n• Training language models to follow instructions (InstructGPT)"},
        {step:"Writing Your Research Notes",desc:"RESEARCH NOTE TEMPLATE:\n\n## Paper: [Title] ([Year])\n**Authors**: ...\n**Venue**: NeurIPS/ICML/ICLR/ArXiv\n**My Rating**: ⭐⭐⭐⭐⭐\n\n## Core Contribution\nOne sentence: What's new?\n\n## Key Idea\n[Explain the core insight in plain language]\n\n## Architecture / Algorithm\n[Sketch or pseudocode]\n\n## Results\nWhat did they beat? By how much?\n\n## Limitations\nWhat did they admit doesn't work?\n\n## My Questions\n- Why didn't they try X?\n- Does this generalize to Y?\n\n## Implementation Notes\n[My code: github.com/you/paper-reproductions/tree/main/paper-name]"}

       steps:[
        {step:"Competition Strategy",desc:"THE KAGGLE FORMULA:\n\nWEEK 1: Understand the problem\n• Read the problem description 5 times\n• Download and explore all data\n• Check for data leakage\n• Read top discussion posts\n• Establish a strong local CV setup\n\nWEEK 2–N: Model development\n• Start with simplest baseline\n• Feature engineering iterations\n• Model ensembling\n• Hyperparameter optimization\n\nFINAL WEEK:\n• Ensemble your top 5 models\n• Test-time augmentation (TTA) for images\n• Stacking if time allows\n• Submit 2 final subs: best CV and most diverse"},
        {step:"Cross-Validation Strategy",desc:"CHOOSE YOUR CV BASED ON DATA TYPE:\n\n# Standard: StratifiedKFold (classification)\nfrom sklearn.model_selection import StratifiedKFold\ncv = StratifiedKFold(n_splits=5, shuffle=True, random_state=42)\n\n# Time-series: TimeSeriesSplit\ncv = TimeSeriesSplit(n_splits=5)\n\n# Groups don't overlap (e.g., patient data):\ncv = GroupKFold(n_splits=5)\n\n# Multi-label:\ncv = MultilabelStratifiedKFold(n_splits=5)\n\nGOLDEN RULE:\nYour local CV must correlate with the public LB.\nIf it doesn't, your CV is wrong — not the LB.\nFix CV before optimizing models."},
        {step:"Ensemble Methods",desc:"THE 3 LEVELS OF ENSEMBLING:\n\nLEVEL 1: Averaging\n# Simple: average predictions\npred_final = (pred_lgb + pred_xgb + pred_nn) / 3\n# Weighted: optimize weights on OOF predictions\n\nLEVEL 2: Blending\n# Train meta-model on holdout predictions\nmeta = LogisticRegression()\nmeta.fit(oof_predictions, y_train)\npred_final = meta.predict_proba(test_predictions)\n\nLEVEL 3: Stacking\n# Full K-fold stacking\nfor fold in kfolds:\n    # Train base models on train folds\n    # Predict on val fold → fills OOF array\n    pass\n# Train meta-model on OOF predictions\n# Predict test using all base models\n\nTIP: Even blending with just 2 good models\nbefore deadline often gives top-10% results."},
        {step:"Feature Engineering for Tabular Data",desc:"THE FEATURE ENGINEERING BIBLE:\n\n1. AGGREGATION FEATURES\n# Group statistics: mean, std, min, max, count\ndf['user_avg_spend'] = df.groupby('user_id')['amount'].transform('mean')\ndf['user_spend_std'] = df.groupby('user_id')['amount'].transform('std')\n\n2. INTERACTION FEATURES\ndf['ratio'] = df['feature_a'] / (df['feature_b'] + 1e-6)\ndf['product'] = df['feature_a'] * df['feature_b']\n\n3. LAG FEATURES (time-series)\ndf['lag_1'] = df.groupby('id')['value'].shift(1)\ndf['rolling_mean_7'] = df.groupby('id')['value'].transform(\n    lambda x: x.shift(1).rolling(7).mean()\n)\n\n4. EMBEDDING-BASED\n# For high-cardinality categoricals\n# Train a simple NN, use penultimate layer as features"}

        {step:"LoRA & QLoRA Fine-tuning",desc:"from transformers import AutoModelForCausalLM, BitsAndBytesConfig\nfrom peft import LoraConfig, get_peft_model, TaskType\n\n# Load in 4-bit (QLoRA)\nbnb_config = BitsAndBytesConfig(\n    load_in_4bit=True,\n    bnb_4bit_quant_type='nf4',\n    bnb_4bit_compute_dtype=torch.bfloat16\n)\n\nmodel = AutoModelForCausalLM.from_pretrained(\n    'meta-llama/Llama-2-7b-hf',\n    quantization_config=bnb_config,\n    device_map='auto'\n)\n\n# LoRA config\nlora_config = LoraConfig(\n    task_type=TaskType.CAUSAL_LM,\n    r=16,           # rank (smaller = fewer params)\n    lora_alpha=32,  # scaling factor\n    target_modules=['q_proj', 'v_proj'],\n    lora_dropout=0.05,\n)\n\nmodel = get_peft_model(model, lora_config)\nmodel.print_trainable_parameters()  # Expect ~0.1% of total"},
        {step:"RLHF & RLAIF",desc:"REINFORCEMENT LEARNING FROM HUMAN FEEDBACK:\n\n3-STEP PROCESS:\n1. Supervised Fine-Tuning (SFT)\n   → Train on high-quality demonstrations\n   → 'This is what good responses look like'\n\n2. Reward Model Training\n   → Collect pairwise preferences (A vs B)\n   → Train RM to predict human preferences\n   → Bradley-Terry model: P(A > B) = σ(r_A - r_B)\n\n3. RL Fine-tuning with PPO\n   → Use RM as reward signal\n   → KL penalty prevents reward hacking\n   → L = E[r_RM(response)] - β·KL(π_RL || π_SFT)\n\nSIMPLER ALTERNATIVE: DPO (Direct Preference Optimization)\n→ No RL, no separate reward model\n→ Single training phase on preference data\n→ Often matches RLHF quality at 10% complexity"},
        {step:"Evaluation & Benchmarking",desc:"LLM EVALUATION LANDSCAPE:\n\nAUTOMATIC BENCHMARKS:\n• MMLU: knowledge across 57 domains\n• HumanEval: code generation\n• GSM8K: grade school math reasoning\n• HellaSwag: commonsense reasoning\n• TruthfulQA: factual accuracy\n• BIG-Bench: 200+ diverse tasks\n\nHUMAN EVAL:\n• MT-Bench: GPT-4 as judge\n• Chatbot Arena: blind A/B testing\n• Domain-specific expert evaluation\n\nYOUR CUSTOM EVAL:\nprompts = load_your_test_cases()\nfor prompt, expected in prompts:\n    response = model.generate(prompt)\n    score = llm_judge(prompt, response, expected)\n    # Always: exact match + fuzzy match + LLM judge\n\nREMEMBER: 'Vibes' is not a benchmark."},
        {step:"Deploying LLMs in Production",desc:"DEPLOYMENT OPTIONS BY SCALE:\n\n1. SINGLE GPU (free tier, testing)\n   • vLLM: PagedAttention, 3× throughput vs HuggingFace\n   • Ollama: local deployment, one command\n   python -m vllm.entrypoints.openai.api_server \\\\\n       --model meta-llama/Llama-2-7b-chat-hf\n\n2. MULTI-GPU (production)\n   • vLLM with tensor parallelism\n   • TGI (Text Generation Inference) by HuggingFace\n   • Triton Inference Server for multi-model serving\n\n3. QUANTIZATION (reduce cost)\n   • GGUF format: runs on CPU!\n   • AWQ/GPTQ: GPU, minimal quality loss\n   • Rule: 4-bit = 4× memory reduction, ~1% accuracy drop\n\n4. COST ESTIMATION\n   Llama-2-7B @ 4-bit: ~4GB VRAM = A10G = $0.40/hr\n   vs GPT-4 API: ~$30/1M tokens\n   → At 10M tokens/day: self-host saves $270K/year"}

        {step:"Object Detection with YOLO",desc:"from ultralytics import YOLO\n\n# Load pretrained model\nmodel = YOLO('yolov8n.pt')  # nano, small, medium, large, xl\n\n# Train on custom dataset\nresults = model.train(\n    data='my_dataset.yaml',\n    epochs=100,\n    imgsz=640,\n    batch=16,\n    project='runs/detect',\n    name='custom_detector',\n    device=0,  # GPU\n    # Advanced:\n    augment=True,\n    mosaic=1.0,\n    mixup=0.1,\n    copy_paste=0.1\n)\n\n# Evaluate\nmetrics = model.val()\nprint(f'mAP50: {metrics.box.map50:.3f}')\nprint(f'mAP50-95: {metrics.box.map:.3f}')\n\n# Export for deployment\nmodel.export(format='onnx')  # 5× faster inference"},
        {step:"Segmentation & Generation",desc:"SEGMENTATION HIERARCHY:\n\nSemantic: every pixel gets a class label\n• Models: SegFormer, Mask2Former\n\nInstance: separate objects of same class  \n• Models: Mask R-CNN, YOLOv8-seg\n\nPanoptic: semantic + instance combined\n• Models: Panoptic-PolarNet, MaskFormer\n\nFOUNDATION MODELS:\nSAM (Segment Anything Model) by Meta:\nfrom segment_anything import SamPredictor, sam_model_registry\nsam = sam_model_registry['vit_h'](checkpoint='sam_vit_h.pth')\npredictor = SamPredictor(sam)\npredictor.set_image(image)\nmasks, _, _ = predictor.predict(\n    point_coords=np.array([[500, 375]]),\n    point_labels=np.array([1])\n)\n\nGENERATION — Stable Diffusion:\nSupercharged by LoRA fine-tuning on domain images."},
        {step:"Video Understanding",desc:"VIDEO = IMAGES + TIME\n\nARCHITECTURES:\n• 3D CNNs: extend spatial → spatiotemporal\n• Two-Stream: RGB + optical flow\n• TimeSformer: space-time attention\n• VideoMAE: masked autoencoding for video\n\nPRACTICAL PIPELINE:\nimport cv2\n\ndef extract_frames(video_path, fps=1):\n    cap = cv2.VideoCapture(video_path)\n    frames = []\n    frame_count = int(cap.get(cv2.CAP_PROP_FPS))\n    skip = max(1, frame_count // fps)\n    \n    i = 0\n    while cap.isOpened():\n        ret, frame = cap.read()\n        if not ret: break\n        if i % skip == 0:\n            frames.append(cv2.cvtColor(frame, cv2.COLOR_BGR2RGB))\n        i += 1\n    cap.release()\n    return np.array(frames)  # (T, H, W, C)"}

/* ── CURSOR TRAIL HOOK ── */
function useCursorTrail(){
  useEffect(()=>{
    const dot=document.createElement('div');
    dot.className='cursor-dot';
    const ring=document.createElement('div');
    ring.className='cursor-ring';
    document.body.appendChild(dot);
    document.body.appendChild(ring);
    let rx=0,ry=0,ax=0,ay=0;
    let raf;
    const onMove=e=>{
      ax=e.clientX;ay=e.clientY;
      dot.style.left=ax+'px';dot.style.top=ay+'px';
      dot.style.opacity='1';ring.style.opacity='1';
    };
    const tick=()=>{
      rx+=(ax-rx)*0.13;ry+=(ay-ry)*0.13;
      ring.style.left=rx+'px';ring.style.top=ry+'px';
      raf=requestAnimationFrame(tick);
    };
    tick();
    const onLeave=()=>{dot.style.opacity='0';ring.style.opacity='0';};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseleave',onLeave);
    return()=>{
      cancelAnimationFrame(raf);
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseleave',onLeave);
      dot.remove();ring.remove();
    };
  },[]);
}

function useCountUp(target,duration=1200){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    let start=0;
    const step=target/60;
    const iv=setInterval(()=>{
      start+=step;
      if(start>=target){setVal(target);clearInterval(iv);}
      else setVal(Math.floor(start));
    },duration/60);
    return()=>clearInterval(iv);
  },[target]);
  return val;
}

              background:'linear-gradient(135deg,#e9d5ff,#c4b5fd,#a78bfa)',
              WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',
              letterSpacing:'-0.02em',
            }},'Mushfiqul Alam Nasif'),
            React.createElement('div',{style:{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}},
              React.createElement('span',{style:{fontSize:10,color:'#38bdf8',fontWeight:600,background:'rgba(56,189,248,0.1)',border:'1px solid rgba(56,189,248,0.2)',borderRadius:6,padding:'2px 8px'}},'🤖 AI Engineer'),
              React.createElement('span',{style:{fontSize:10,color:'#a78bfa',fontWeight:600,background:'rgba(167,139,250,0.1)',border:'1px solid rgba(167,139,250,0.2)',borderRadius:6,padding:'2px 8px'}},'🎓 Educator'),
              React.createElement('span',{style:{fontSize:10,color:'#34d399',fontWeight:600,background:'rgba(52,211,153,0.1)',border:'1px solid rgba(52,211,153,0.2)',borderRadius:6,padding:'2px 8px'}},'🇧🇩 Dhaka')
            ),
            React.createElement('div',{style:{
              position:'relative',
              background:'rgba(139,92,246,0.07)',
              border:'1px solid rgba(139,92,246,0.25)',
              borderLeft:'3px solid #8b5cf6',
              borderRadius:'0 12px 12px 0',
              padding:'12px 16px',marginBottom:8,
            }},
              React.createElement('div',{style:{fontSize:26,lineHeight:1,color:'rgba(139,92,246,0.4)',fontFamily:'Georgia,serif',marginBottom:4}},'"'),
              React.createElement('p',{style:{
                fontSize:12.5,lineHeight:1.75,
                color:'rgba(244,244,255,0.88)',fontStyle:'italic',fontWeight:500,margin:0,
              }},"I built this platform because the best AI education should be free. Every student deserves world-class learning, regardless of where they\'re from or how much money they have."),
              React.createElement('div',{style:{fontSize:11,color:'#a78bfa',fontWeight:700,marginTop:8}},'— Mushfiqul Alam Nasif · Dhaka, Bangladesh 🇧🇩')
            )
          )
        )
      ),

      /* ── TIPS ── */
      React.createElement('div',{style:{marginBottom:20}},
        React.createElement('div',{style:{
          fontSize:11,color:T.textMuted,fontWeight:700,textTransform:'uppercase',
          letterSpacing:'0.12em',marginBottom:12,
          display:'flex',alignItems:'center',gap:8,
        }},
          React.createElement('div',{style:{width:20,height:1,background:'rgba(255,255,255,0.1)'}}),
          '💡 Quick Tips for You',
          React.createElement('div',{style:{flex:1,height:1,background:'rgba(255,255,255,0.1)'}})
        ),
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:10}},
          tips.map(function(tip,i){
            return React.createElement('div',{
              key:i,className:'card',
              style:{padding:'14px 16px',cursor:'pointer',
                background:showTip===i?'rgba(139,92,246,0.1)':'rgba(255,255,255,0.04)'},
              onClick:()=>setShowTip(showTip===i?null:i),
            },
              React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:showTip===i?8:0}},
                React.createElement('span',{style:{fontSize:18}},tip.icon),
                React.createElement('span',{style:{fontSize:12,fontWeight:700,color:T.text}},tip.title),
                React.createElement('span',{style:{marginLeft:'auto',fontSize:10,color:T.textMuted}},showTip===i?'▲':'▼')
              ),
              showTip===i&&React.createElement('p',{style:{fontSize:11.5,color:T.textSub,lineHeight:1.7,margin:0}},tip.desc)
            );
          })
        )
      ),

      /* ── BOTTOM ── */
      React.createElement('div',{className:'card',style:{padding:'20px 24px',textAlign:'center'}},
        React.createElement('div',{style:{fontSize:13,color:T.textSub,lineHeight:1.8,marginBottom:16}},"Made with ❤️ for every aspiring AI engineer who can\'t afford $50K/year. Built on free tools, open-source forever."),
        React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}},
          [{l:'⭐ Star on GitHub',c:'#f59e0b'},{l:'🐦 Share on Twitter',c:'#38bdf8'},{l:'✨ Replay Splash',c:'#8b5cf6'}].map(function(b,i){
            return React.createElement('button',{key:i,className:'btn-ghost',
              onClick:function(){if(b.l.includes('Splash')){try{localStorage.removeItem('aaa_splashed');}catch(e){}window.location.reload();}},
              style:{fontSize:12,color:b.c,borderColor:b.c+'30'}
            },b.l);
          })
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
